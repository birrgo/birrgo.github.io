<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BirrGo - Allocated Tickets Registry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-burgundy: #4a0011;
            --primary-gradient: linear-gradient(135deg, #600016 0%, #30000a 100%);
            --gold-gradient: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --border-light: #e2e8f0;
            --card-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05), 0 4px 12px -2px rgba(0, 0, 0, 0.03);
            --border-radius-lg: 24px;
            --border-radius-md: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: -0.2px;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            background-color: #f1f5f9;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-view {
            width: 100%;
            height: 100dvh;
            max-width: 450px;
            background-color: #f1f5f9;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }

        /* Reduced Height Top Header */
        .app-header {
            width: 100%;
            background: var(--primary-burgundy);
            color: #ffffff;
            position: relative;
            padding: calc(10px + env(safe-area-inset-top)) 16px 24px 16px;
            z-index: 10;
        }

        .header-top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 3;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            text-decoration: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-back:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.3);
        }

        .header-logo-img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Title & Live Tracker Centered */
        .header-center-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-top: -6px;
            position: relative;
            z-index: 3;
        }

        .header-title h2 {
            font-size: 14px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        /* Live Tracker Pill */
        .live-tracker-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 4px;
            backdrop-filter: blur(4px);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            animation: pulse-animation 1.5s infinite;
        }

        @keyframes pulse-animation {
            0% {
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            }
            70% {
                box-shadow: 0 0 0 5px rgba(34, 197, 94, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
            }
        }

        .live-tracker-text {
            font-size: 9px;
            font-weight: 700;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Compact SVG Curve */
        .app-header-curve {
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            overflow: hidden;
            line-height: 0;
        }

        .app-header-curve svg {
            position: relative;
            display: block;
            width: calc(100% + 1.3px);
            height: 15px;
        }

        .app-header-curve .shape-fill {
            fill: #f1f5f9;
        }

        .app-content {
            flex: 1;
            overflow-y: auto;
            background-color: #f1f5f9;
            padding: 10px 16px 85px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scrollbar-width: none;
        }
        .app-content::-webkit-scrollbar { display: none; }

        /* Search Box Container */
        .search-box-container {
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .search-input {
            width: 100%;
            height: 48px;
            border-radius: 12px;
            border: 1.5px solid var(--border-light);
            padding: 0 16px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            outline: none;
            background: #ffffff;
            box-shadow: var(--card-shadow);
            transition: border-color 0.2s ease;
        }

        .search-input:focus {
            border-color: var(--primary-burgundy);
        }

        .section-label-header {
            font-size: 12px;
            font-weight: 800;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            border-left: 3px solid var(--primary-burgundy);
            padding-left: 8px;
            margin-top: 4px;
        }

        .dashboard-list-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .dashboard-row-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            border: 1px solid var(--border-light);
            padding: 14px 16px;
            border-radius: var(--border-radius-md);
            box-shadow: var(--card-shadow);
        }

        .number-badge {
            background: var(--primary-gradient);
            color: #ffd700;
            font-weight: 800;
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 10px;
            min-width: 70px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(74, 0, 17, 0.2);
        }

        .owner-details {
            text-align: right;
        }

        .owner-phone {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .owner-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        
        .loading-text {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            padding: 30px 0;
            background: #ffffff;
            border-radius: 14px;
            border: 1px dashed var(--border-light);
        }

        /* Fixed Bottom Advertisement Container */
        .ad-container {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 418px;
            background: #ffffff;
            border: 1px dashed #cbd5e1;
            border-radius: 14px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            z-index: 100;
        }

        .ad-tag {
            position: absolute;
            top: 4px;
            right: 8px;
            font-size: 9px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .ad-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="app-view">
        
        <!-- Compact Top Navigation Curved Header -->
        <header class="app-header">
            <div class="header-top-bar">
                <button class="btn-back" onclick="window.location.href='jetour.html'" aria-label="Back">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <img src="birrgo-logo.png" alt="BirrGo Logo" class="header-logo-img" />
            </div>

            <!-- Title & Live Tracker Badge centered inside top curve -->
            <div class="header-center-content">
                <div class="header-title">
                    <h2>Allocation Matrix Logs</h2>
                </div>
                <div class="live-tracker-badge">
                    <span class="pulse-dot"></span>
                    <span class="live-tracker-text">Live Tracker Active</span>
                </div>
            </div>

            <!-- Reduced Height Curved SVG Cutout -->
            <div class="app-header-curve">
                <svg viewBox="0 0 1200 120" preserveAspectRatio="none">
                    <path d="M0,0 C300,60 900,60 1200,0 L1200,120 L0,120 Z" class="shape-fill"></path>
                </svg>
            </div>
        </header>

        <div class="app-content">
            
            <!-- Search Panel -->
            <div class="search-box-container">
                <input type="text" id="dashboardSearch" class="search-input" placeholder="🔍 Filter by positional metric indexes...">
            </div>

            <div class="section-label-header">Live Registry Matrix</div>

            <div id="loadingIndicator" class="loading-text">Synchronizing allocation registry matrix...</div>

            <div class="dashboard-list-stack" id="dashboardStack"></div>

        </div>

        <!-- Fixed Bottom Advertisement Container -->
        <div class="ad-container">
            <span class="ad-tag">AD</span>
            <div class="ad-content">
                📢 <span>Advertisement Space</span>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRHoIZf1ZPR9m3YYTv-I9CfwyGqsSOMWo",
            authDomain: "birrgo-fdf7e.firebaseapp.com",
            databaseURL: "https://birrgo-fdf7e-default-rtdb.firebaseio.com",
            projectId: "birrgo-fdf7e",
            storageBucket: "birrgo-fdf7e.firebasestorage.app",
            messagingSenderId: "2317445154",
            appId: "1:2317445154:web:4275cbb0f46b28f64f827b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let masterTicketsArray = [];

        document.addEventListener('DOMContentLoaded', () => {
            if(!localStorage.getItem('auth_session_phone')) {
                window.location.href = "login.html";
                return;
            }

            fetchAllocatedRegistry();
            document.getElementById('dashboardSearch').addEventListener('input', filterDashboardRegistry);
        });

        function fetchAllocatedRegistry() {
            const ticketsRef = ref(db, 'lottery/jetour/tickets');
            onValue(ticketsRef, (snapshot) => {
                document.getElementById('loadingIndicator').style.display = 'none';
                const data = snapshot.val() || {};
                
                // Convert to array and sort numerically by Ticket Number
                masterTicketsArray = Object.values(data).sort((a, b) => parseInt(a.ticketNum) - parseInt(b.ticketNum));
                renderDashboardRegistry(masterTicketsArray);
            });
        }

        function renderDashboardRegistry(items) {
            const container = document.getElementById('dashboardStack');
            container.innerHTML = '';

            if(items.length === 0) {
                container.innerHTML = `<div style="text-align:center;font-size:13px;color:var(--text-muted);padding:30px;background:#fff;border-radius:14px;border:1px dashed var(--border-light);">No records match the current query filter elements.</div>`;
                return;
            }

            items.forEach(ticket => {
                const card = document.createElement('div');
                card.className = 'dashboard-row-card';

                const rawPhone = ticket.phone || "0900000000";
                const hiddenPhone = rawPhone.substring(0, 5) + "••••" + rawPhone.slice(-2);
                const location = ticket.location || "Addis Ababa";

                card.innerHTML = `
                    <div class="number-badge">#${ticket.ticketNum}</div>
                    <div class="owner-details">
                        <div class="owner-phone">👤 ${hiddenPhone}</div>
                        <div class="owner-meta">📍 ${location}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterDashboardRegistry() {
            const query = document.getElementById('dashboardSearch').value.toLowerCase().trim();
            
            const filtered = masterTicketsArray.filter(t => {
                const phoneMatch = (t.phone || "").toLowerCase().includes(query);
                const numberMatch = (t.ticketNum || "").toString().includes(query);
                const locationMatch = (t.location || "").toLowerCase().includes(query);
                return phoneMatch || numberMatch || locationMatch;
            });

            renderDashboardRegistry(filtered);
        }
    </script>
</body>
</html>
