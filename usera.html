<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BirrGo | Activity Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="usera.css">
</head>
<body>

    <!-- Low-Height Wave Header Area -->
    <div class="top-wave-header-wrapper">
        <div class="top-header-content">
            <button class="btn-circle-back" onclick="window.location.href='deposit.html'">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>

            <div class="header-center-title">USER ACTIVITY</div>

            <div class="admin-status-3d-glass">
                <span id="admin-status-indicator-dot"></span>
                <span>Gateway: <strong id="admin-status-label">Online</strong></span>
            </div>
        </div>

        <svg class="header-wave-svg" viewBox="0 0 375 16" preserveAspectRatio="none" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 0 H375 V8 Q 280 16, 187.5 10 T 0 8 Z" fill="#4d0511"/>
        </svg>
    </div>

    <div class="app-view">
        <div class="main-body-content">
            <div class="step-view active" id="screen-activity">
                <div class="screen-title">Track <span>Transactions</span></div>
                <div class="screen-subtitle">Track your open, pending, approved, or cancelled deposit orders</div>

                <div class="activity-tabs">
                    <button class="activity-tab-btn active" id="tab-unpaid" onclick="filterActivity('unpaid')">
                        Unpaid <span id="count-unpaid" class="tab-count-badge" style="display:none;">0</span>
                    </button>
                    <button class="activity-tab-btn" id="tab-pending" onclick="filterActivity('pending')">
                        Pending <span id="count-pending" class="tab-count-badge" style="display:none;">0</span>
                    </button>
                    <button class="activity-tab-btn" id="tab-approved" onclick="filterActivity('approved')">Approved</button>
                    <button class="activity-tab-btn" id="tab-rejected" onclick="filterActivity('rejected')">Rejected</button>
                    <button class="activity-tab-btn" id="tab-cancelled" onclick="filterActivity('cancelled')">Cancelled</button>
                </div>

                <!-- SINGLE GLOBAL NOTIFICATION POPUP -->
                <div id="status-popup-area"></div>

                <div class="activity-list" id="activity-list-container">
                    <div class="empty-activity-state">Connecting to servers...</div>
                </div>
            </div>
        </div>

        <button class="chat-floating-btn" id="chatFloatingBtn" onclick="toggleChatWindow(event)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            Live Support
            <span id="support-unread-badge" class="chat-badge-count" style="display: none;">0</span>
        </button>

        <div class="bottom-ad-container">
            <span class="ad-tag">AD</span>
            <span class="ad-text">Advertisement Space</span>
        </div>
    </div>

    <!-- Chat Modal Window -->
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <div class="chat-merchant-info">
                <div class="chat-avatar">
                    BG
                    <div class="status-dot-inner" id="chat-header-dot"></div>
                </div>
                <div>
                    <div class="chat-title">BirrGo Support</div>
                    <div class="chat-status-text" id="chat-status-text">Online</div>
                </div>
            </div>
            <button class="close-chat-btn" onclick="toggleChatWindow(event)">&times;</button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chatInput" placeholder="Message support..." onkeydown="handleChatKey(event)">
            <button class="chat-send-btn" onclick="sendUserMessage()">Send</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, onChildAdded, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRHoIZf1ZPR9m3YYTv-I9CfwyGqsSOMWo",
            authDomain: "birrgo-fdf7e.firebaseapp.com",
            databaseURL: "https://birrgo-fdf7e-default-rtdb.firebaseio.com",
            projectId: "birrgo-fdf7e",
            storageBucket: "birrgo-fdf7e.firebasestorage.app",
            messagingSenderId: "2317445154",
            appId: "1:2317445154:web:4275cbb0f46b28f64f827b",
            measurementId: "G-24X13TZ43D"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let userId = localStorage.getItem("auth_session_phone") || localStorage.getItem("current_user_id") || "DEV_USER";
        let userTransactionsList = [];
        let currentActivityFilter = 'unpaid';
        let isChatListenerAttached = false;
        let isMerchantOnline = true;
        let isChatOpen = false;

        window.toggleChatWindow = function(e) {
            if(e) e.preventDefault();
            const win = document.getElementById('chatWindow');
            if (win.style.display === 'flex') {
                win.style.display = 'none';
                isChatOpen = false;
            } else {
                win.style.display = 'flex';
                isChatOpen = true;
                markMessagesAsRead();
                initializeChatListener();
            }
        };

        window.sendUserMessage = function() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';

            const userChatRef = ref(db, `chats/${userId}/messages`);
            push(userChatRef, {
                sender: 'user',
                text: text,
                isRead: true,
                timestamp: Date.now()
            });
        };

        window.handleChatKey = function(event) {
            if (event.key === 'Enter') sendUserMessage();
        };

        function initializeChatListener() {
            if (isChatListenerAttached) return; 
            isChatListenerAttached = true;

            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML = ''; 

            const messagesRef = ref(db, `chats/${userId}/messages`);
            onChildAdded(messagesRef, (snapshot) => {
                const message = snapshot.val();
                if (message && message.text) {
                    appendChatMessage(message.text, message.sender || 'merchant');
                }
            });
        }

        function appendChatMessage(text, sender) {
            const chatMessages = document.getElementById('chatMessages');
            const bubble = document.createElement('div');
            bubble.classList.add('chat-bubble', sender);
            bubble.innerText = text;
            chatMessages.appendChild(bubble);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function markMessagesAsRead() {
            const userChatRef = ref(db, `chats/${userId}/messages`);
            onValue(userChatRef, (snapshot) => {
                if (snapshot.exists()) {
                    const updates = {};
                    snapshot.forEach((child) => {
                        const msg = child.val();
                        if (msg && (msg.sender === 'merchant' || msg.sender === 'support' || msg.sender !== 'user')) {
                            if (!msg.isRead) updates[`chats/${userId}/messages/${child.key}/isRead`] = true;
                        }
                    });
                    if (Object.keys(updates).length > 0) update(ref(db), updates);
                }
            }, { onlyOnce: true });

            const badgeEl = document.getElementById('support-unread-badge');
            if (badgeEl) badgeEl.style.display = 'none';
        }

        function listenForUnreadMessagesRealtime() {
            const userChatRef = ref(db, `chats/${userId}/messages`);
            onValue(userChatRef, (snapshot) => {
                let unreadCount = 0;
                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        const msg = childSnapshot.val();
                        const isFromSupport = msg && (msg.sender === 'merchant' || msg.sender === 'support' || msg.sender !== 'user');
                        if (isFromSupport && !msg.isRead) unreadCount++;
                    });
                }

                const badgeEl = document.getElementById('support-unread-badge');
                if (!isChatOpen && unreadCount > 0) {
                    badgeEl.innerText = unreadCount;
                    badgeEl.style.display = 'inline-block';
                } else {
                    badgeEl.style.display = 'none';
                }
            });
        }

        // PERMANENT CLEARANCE OF POPUP NOTIFICATION
        window.acknowledgeOrderStatus = function(orderId) {
            const updates = {};
            updates[`users/${userId}/transactions/${orderId}/userRead`] = true;
            update(ref(db), updates).then(() => {
                renderActivityItems();
            });
        };

        function fetchUserTransactionsRealtime() {
            const userHistoryRef = ref(db, `users/${userId}/transactions`);
            onValue(userHistoryRef, (snapshot) => {
                userTransactionsList = [];
                let unpaidCount = 0;
                let pendingCount = 0;

                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        const data = childSnapshot.val();
                        const itemObj = { id: childSnapshot.key, ...data };
                        userTransactionsList.push(itemObj);

                        const status = (data.status || '').toLowerCase();
                        if (status === 'unpaid' || status === 'open') unpaidCount++;
                        if (status === 'pending' || status === 'waiting approval') pendingCount++;
                    });
                    userTransactionsList.reverse();
                }

                const unpaidBadge = document.getElementById('count-unpaid');
                const pendingBadge = document.getElementById('count-pending');

                unpaidBadge.innerText = unpaidCount;
                unpaidBadge.style.display = unpaidCount > 0 ? 'inline-block' : 'none';

                pendingBadge.innerText = pendingCount;
                pendingBadge.style.display = pendingCount > 0 ? 'inline-block' : 'none';

                const chatBtn = document.getElementById('chatFloatingBtn');
                const chatWin = document.getElementById('chatWindow');

                if (unpaidCount > 0 || pendingCount > 0) {
                    if (chatBtn) chatBtn.style.display = 'flex';
                } else {
                    if (chatBtn) chatBtn.style.display = 'none';
                    if (chatWin) chatWin.style.display = 'none';
                    isChatOpen = false;
                }

                renderActivityItems();
            });
        }

        function runDatabaseIntegration() {
            const globalStatusRef = ref(db, 'settings/gateway_online');
            onValue(globalStatusRef, (snapshot) => {
                isMerchantOnline = snapshot.exists() ? snapshot.val() : true;
                const adminLabel = document.getElementById('admin-status-label');
                const indicatorDot = document.getElementById('admin-status-indicator-dot');
                if (isMerchantOnline) {
                    adminLabel.innerText = "Online";
                    adminLabel.style.color = "#10b981";
                    indicatorDot.style.backgroundColor = "#10b981";
                } else {
                    adminLabel.innerText = "Offline";
                    adminLabel.style.color = "#ef4444";
                    indicatorDot.style.backgroundColor = "#ef4444";
                }
            });

            fetchUserTransactionsRealtime();
            listenForUnreadMessagesRealtime();
        }

        window.filterActivity = function(filter) {
            currentActivityFilter = filter;
            document.querySelectorAll('.activity-tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${filter}`).classList.add('active');
            renderActivityItems();
        };

        function getMethodIdFromTitle(title) {
            const lowerTitle = (title || '').toLowerCase();
            if (lowerTitle.includes('cbe birr')) return 'cbebirr';
            if (lowerTitle.includes('commercial bank')) return 'cbe';
            if (lowerTitle.includes('abyssinia')) return 'boa';
            if (lowerTitle.includes('telebirr')) return 'telebirr';
            if (lowerTitle.includes('mpesa') || lowerTitle.includes('m-pesa')) return 'mpesa';
            return 'telebirr'; 
        }

        window.redirectToOrderPage = function(orderRef, amount, rawTitle, dbKey) {
            const methodId = getMethodIdFromTitle(rawTitle);
            const redirectUrl = `order.html?ref=${encodeURIComponent(orderRef)}&amount=${encodeURIComponent(amount)}&method=${encodeURIComponent(methodId)}&key=${encodeURIComponent(dbKey)}`;
            window.location.href = redirectUrl;
        };

        function renderActivityItems() {
            const container = document.getElementById('activity-list-container');
            const popupArea = document.getElementById('status-popup-area');
            container.innerHTML = '';
            popupArea.innerHTML = '';

            // RENDER ONLY ONE SINGLE UNREAD POPUP ACROSS THE WHOLE SYSTEM AT ANY TIME
            let activePopupItem = userTransactionsList.find(item => item.userRead !== true);

            if (activePopupItem) {
                const status = (activePopupItem.status || 'unpaid').toLowerCase();
                let stateClass = 'unpaid';
                let bannerTitle = 'Payment Pending';
                let message = `Order Ref #${activePopupItem.orderRef || 'N/A'} - Action Required`;
                let actionBtnText = 'Clear Notification';

                if (status === 'pending' || status === 'waiting approval') {
                    stateClass = 'pending';
                    bannerTitle = 'Under Review';
                    message = `Order Ref #${activePopupItem.orderRef || 'N/A'} is currently being processed.`;
                } else if (status === 'approved' || status === 'success' || status === 'completed') {
                    stateClass = 'approved';
                    bannerTitle = 'Order Approved';
                    message = `Order Ref #${activePopupItem.orderRef || 'N/A'} verified! ${activePopupItem.amount || 0} Birr credited.`;
                } else if (status === 'rejected' || status === 'failed') {
                    stateClass = 'rejected';
                    bannerTitle = 'Order Rejected';
                    message = `Order Ref #${activePopupItem.orderRef || 'N/A'} could not be processed.`;
                } else if (status === 'cancelled') {
                    stateClass = 'cancelled';
                    bannerTitle = 'Order Cancelled';
                    message = `Order Ref #${activePopupItem.orderRef || 'N/A'} was cancelled.`;
                }

                popupArea.innerHTML = `
                    <div class="status-popup-banner ${stateClass}">
                        <div class="popup-banner-content">
                            <div class="popup-banner-title">${bannerTitle}</div>
                            <div class="popup-banner-text">${message}</div>
                        </div>
                        <button class="btn-read-ack" onclick="acknowledgeOrderStatus('${activePopupItem.id}')">${actionBtnText}</button>
                    </div>
                `;
            }

            // FILTER CARDS PER SELECTED TAB
            const filteredList = userTransactionsList.filter(item => {
                const status = (item.status || 'unpaid').toLowerCase();
                const type = (item.type || '').toLowerCase();
                const title = (item.title || '').toLowerCase();
                const isDeposit = type.includes('deposit') || title.includes('deposit') || (!item.type && !item.title);

                if (currentActivityFilter === 'unpaid') return isDeposit && (status === 'unpaid' || status === 'open');
                if (currentActivityFilter === 'pending') return isDeposit && (status === 'pending' || status === 'waiting approval');
                if (currentActivityFilter === 'approved') return status === 'approved' || status === 'success' || status === 'completed';
                if (currentActivityFilter === 'rejected') return status === 'rejected' || status === 'failed';
                if (currentActivityFilter === 'cancelled') return status === 'cancelled';
                return false;
            });

            if (filteredList.length === 0) {
                container.innerHTML = `<div class="empty-activity-state">No ${currentActivityFilter} orders found.</div>`;
                return;
            }

            filteredList.forEach(item => {
                const card = document.createElement('div');
                card.classList.add('activity-item');
                const cleanAmount = parseFloat(item.amount || 0).toLocaleString();

                if (currentActivityFilter === 'unpaid') {
                    card.classList.add('unpaid-card');
                    card.innerHTML = `
                        <div class="activity-item-header">
                            <span class="activity-item-title">${item.title || 'Deposit Request'}</span>
                            <span class="activity-badge unpaid">UNPAID</span>
                        </div>
                        <div class="activity-meta">
                            <span>Ref: ${item.orderRef || 'N/A'}</span>
                            <span class="activity-item-amount" style="color: var(--accent-burgundy-red)">${cleanAmount} Birr</span>
                        </div>
                        <div class="activity-meta" style="margin-top:2px; font-size:10px;">
                            <span>Created: ${item.timestamp || 'Just now'}</span>
                        </div>
                        <div class="card-action-box">
                            <button class="btn-continue-payment" onclick="redirectToOrderPage('${item.orderRef || ""}', '${item.amount || 0}', '${item.title || ""}', '${item.id || ""}')">
                                Complete Payment &rarr;
                            </button>
                        </div>
                    `;
                } else if (currentActivityFilter === 'pending') {
                    card.classList.add('pending-card');
                    card.innerHTML = `
                        <div class="activity-item-header">
                            <span class="activity-item-title">${item.title || 'Deposit Request'}</span>
                            <span class="activity-badge pending">Pending Approval</span>
                        </div>
                        <div class="activity-meta">
                            <span>Ref: ${item.orderRef || 'N/A'}</span>
                            <span class="activity-item-amount" style="color: #2563eb">${cleanAmount} Birr</span>
                        </div>
                        <div class="activity-meta" style="margin-top:2px; font-size:10px;">
                            <span>Submitted: ${item.timestamp || ''}</span>
                        </div>
                    `;
                } else if (currentActivityFilter === 'approved') {
                    card.innerHTML = `
                        <div class="activity-item-header">
                            <span class="activity-item-title">${item.title || 'Deposit Verified'}</span>
                            <span class="activity-badge approved">APPROVED</span>
                        </div>
                        <div class="activity-meta">
                            <span>Ref: ${item.orderRef || 'N/A'}</span>
                            <span class="activity-item-amount" style="color: #059669">+${cleanAmount} Birr</span>
                        </div>
                        <div class="activity-meta" style="margin-top:2px; font-size:10px;">
                            <span>Verified: ${item.timestamp || ''}</span>
                        </div>
                    `;
                } else if (currentActivityFilter === 'cancelled') {
                    card.classList.add('cancelled-card');
                    card.innerHTML = `
                        <div class="activity-item-header">
                            <span class="activity-item-title">${item.title || 'Cancelled Deposit'}</span>
                            <span class="activity-badge cancelled">CANCELLED</span>
                        </div>
                        <div class="activity-meta">
                            <span>Ref: ${item.orderRef || 'N/A'}</span>
                            <span class="activity-item-amount" style="color: #6b7280">${cleanAmount} Birr</span>
                        </div>
                        <div class="activity-meta" style="margin-top:2px; font-size:10px;">
                            <span>Date: ${item.timestamp || ''}</span>
                        </div>
                    `;
                } else {
                    card.innerHTML = `
                        <div class="activity-item-header">
                            <span class="activity-item-title">${item.title || 'Deposit'}</span>
                            <span class="activity-badge ${(item.status || '').toLowerCase()}">${item.status || ''}</span>
                        </div>
                        <div class="activity-meta">
                            <span>Ref: ${item.orderRef || 'N/A'}</span>
                            <span class="activity-item-amount">${cleanAmount} Birr</span>
                        </div>
                        <div class="activity-meta" style="margin-top:2px; font-size:10px;">
                            <span>Date: ${item.timestamp || ''}</span>
                        </div>
                    `;
                }

                container.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            runDatabaseIntegration();
        });
    </script>
</body>
</html>
