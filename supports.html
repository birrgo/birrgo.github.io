<!DOCTYPE html>
<html lang="en" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="google" content="notranslate">
    <title>Admin Support Management | BirrGo Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-burgundy: #800020;
            --primary-burgundy-gradient: linear-gradient(135deg, #4a0012 0%, #800020 50%, #2b000a 100%);
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --input-bg: #f1f5f9;
            --card-shadow: 0 8px 24px -4px rgba(0, 0, 0, 0.04);
            --success-green: #10b981;
            --warning-orange: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            letter-spacing: -0.3px;
            -webkit-font-smoothing: antialiased;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            background-color: #fafbfc;
            background-image: 
                radial-gradient(rgba(148, 163, 184, 0.12) 1px, transparent 1px), 
                linear-gradient(to right, rgba(148, 163, 184, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(148, 163, 184, 0.03) 1px, transparent 1px);
            background-size: 20px 20px, 40px 40px, 40px 40px;
            color: var(--text-dark);
        }

        .app-view {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: calc(24px + env(safe-area-inset-top)) 20px 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-back-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ffffff;
            border: 1.5px solid #e2e8f0;
            color: var(--text-dark);
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: all 0.2s ease;
        }

        .btn-back-nav:hover {
            background: var(--input-bg);
            transform: translateX(-2px);
        }

        .admin-title h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .admin-title h1 span {
            color: var(--primary-burgundy);
        }

        .admin-title p {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 2px;
        }

        .settings-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .settings-card h2 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
        }

        .input-group input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: var(--input-bg);
            font-size: 13px;
            font-weight: 500;
            color: var(--text-dark);
            transition: all 0.2s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-burgundy);
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(128, 0, 32, 0.1);
        }

        .btn-save-links {
            background: var(--primary-burgundy-gradient);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-save-links:hover {
            opacity: 0.9;
        }

        .section-divider {
            border: 0;
            height: 1px;
            background: #e2e8f0;
            margin: 10px 0;
        }

        .filter-row {
            display: flex;
            gap: 8px;
            background: #ffffff;
            padding: 6px;
            border-radius: 30px;
            box-shadow: var(--card-shadow);
            border: 1px solid #e2e8f0;
            align-self: flex-start;
        }

        .filter-btn {
            border: none;
            background: transparent;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background: var(--primary-burgundy-gradient);
            color: #ffffff;
        }

        .tickets-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .ticket-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(226, 232, 240, 0.8);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .ticket-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        .ticket-meta h3 {
            font-size: 15px;
            font-weight: 700;
        }

        .ticket-meta p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .badge {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .badge.open {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning-orange);
        }

        .badge.resolved {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-green);
        }

        .ticket-body {
            background: var(--input-bg);
            padding: 14px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.5;
            color: #334155;
            font-weight: 500;
            white-space: pre-wrap;
        }

        .ticket-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #f1f5f9;
            padding-top: 12px;
        }

        .user-details {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .user-details a {
            color: var(--primary-burgundy);
            text-decoration: none;
        }

        .action-group {
            display: flex;
            gap: 8px;
        }

        .btn-ui {
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.15s ease;
        }

        .btn-resolve {
            background: #ffffff;
            color: var(--success-green);
            border-color: var(--success-green);
        }

        .btn-resolve:hover {
            background: var(--success-green);
            color: #ffffff;
        }

        .btn-delete {
            background: #ffffff;
            color: #ef4444;
            border-color: #fee2e2;
        }

        .btn-delete:hover {
            background: #ef4444;
            color: #ffffff;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .empty-state h3 {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .empty-state p {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* CUSTOM UI MODAL STYLES */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: #ffffff;
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
            transform: scale(0.95);
            transition: transform 0.25s ease;
            text-align: center;
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px auto;
        }

        .modal-icon.info { background: rgba(128, 0, 32, 0.1); color: var(--primary-burgundy); }
        .modal-icon.danger { background: rgba(239, 68, 68, 0.1); color: #ef4444; }

        .modal-title { font-size: 17px; font-weight: 800; margin-bottom: 8px; }
        .modal-message { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 20px; }

        .modal-actions { display: flex; gap: 10px; justify-content: center; }

        .modal-btn {
            flex: 1;
            height: 42px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .modal-btn-primary { background: var(--primary-burgundy-gradient); color: #fff; }
        .modal-btn-danger { background: #ef4444; color: #fff; }
        .modal-btn-secondary { background: var(--input-bg); color: var(--text-dark); }
    </style>
</head>
<body>

    <main class="app-view">
        <header class="admin-header">
            <div class="header-left">
                <a href="new.html" class="btn-back-nav" title="Back to Control Panel">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                </a>
                <div class="admin-title">
                    <h1>Support <span>Control Panel</span></h1>
                    <p>Monitor customer inquiries and manage official platform contact links</p>
                </div>
            </div>
        </header>

        <section class="settings-card">
            <h2>🔗 Live Contact Links Management</h2>
            <div class="links-grid">
                <div class="input-group">
                    <label for="linkEmail">Support Email Address</label>
                    <input type="email" id="linkEmail" placeholder="support@birrgo.com">
                </div>
                <div class="input-group">
                    <label for="linkInstagram">Instagram URL</label>
                    <input type="url" id="linkInstagram" placeholder="https://instagram.com/birrgo">
                </div>
                <div class="input-group">
                    <label for="linkTelegram">Telegram Channel/Username URL</label>
                    <input type="url" id="linkTelegram" placeholder="https://t.me/birrgo">
                </div>
            </div>
            <button class="btn-save-links" onclick="saveContactLinks()">Update Channels Instantly</button>
        </section>

        <hr class="section-divider">

        <div class="filter-row">
            <button class="filter-btn active" id="btn-filter-all" onclick="setFilter('all')">All Tickets</button>
            <button class="filter-btn" id="btn-filter-open" onclick="setFilter('open')">Open</button>
            <button class="filter-btn" id="btn-filter-resolved" onclick="setFilter('resolved')">Resolved</button>
        </div>

        <div class="tickets-container" id="ticketsWrapper">
            <div class="empty-state">
                <h3>Connecting...</h3>
                <p>Fetching real-time streams...</p>
            </div>
        </div>
    </main>

    <!-- CUSTOM UI MODAL DIALOG CONTAINER -->
    <div class="modal-overlay" id="customModal">
        <div class="modal-box">
            <div class="modal-icon info" id="modalIcon"></div>
            <h3 class="modal-title" id="modalTitle">Notice</h3>
            <p class="modal-message" id="modalMessage">Message content goes here.</p>
            <div class="modal-actions" id="modalActions">
                <button class="modal-btn modal-btn-primary" onclick="closeModal()">OK</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRHoIZf1ZPR9m3YYTv-I9CfwyGqsSOMWo",
            authDomain: "birrgo-fdf7e.firebaseapp.com",
            databaseURL: "https://birrgo-fdf7e-default-rtdb.firebaseio.com",
            projectId: "birrgo-fdf7e",
            storageBucket: "birrgo-fdf7e.firebasestorage.app",
            messagingSenderId: "2317445154",
            appId: "1:2317445154:web:4275cbb0f46b28f64f827b",
            measurementId: "G-24X13TZ43D"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        
        let allTickets = {};
        let currentFilter = 'all';

        // MODAL ENGINE LOGIC
        window.showModal = function({ title, message, type = 'info', confirmText = 'OK', showCancel = false, onConfirm = null }) {
            const overlay = document.getElementById('customModal');
            const icon = document.getElementById('modalIcon');
            const titleEl = document.getElementById('modalTitle');
            const msgEl = document.getElementById('modalMessage');
            const actionsEl = document.getElementById('modalActions');

            titleEl.innerText = title;
            msgEl.innerText = message;
            
            icon.className = `modal-icon ${type === 'danger' ? 'danger' : 'info'}`;
            icon.innerHTML = type === 'danger' 
                ? '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'
                : '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>';

            actionsEl.innerHTML = '';

            if (showCancel) {
                const cancelBtn = document.createElement('button');
                cancelBtn.className = 'modal-btn modal-btn-secondary';
                cancelBtn.innerText = 'Cancel';
                cancelBtn.onclick = closeModal;
                actionsEl.appendChild(cancelBtn);
            }

            const confirmBtn = document.createElement('button');
            confirmBtn.className = `modal-btn ${type === 'danger' ? 'modal-btn-danger' : 'modal-btn-primary'}`;
            confirmBtn.innerText = confirmText;
            confirmBtn.onclick = () => {
                closeModal();
                if (onConfirm) onConfirm();
            };
            actionsEl.appendChild(confirmBtn);

            overlay.classList.add('active');
        };

        window.closeModal = function() {
            document.getElementById('customModal').classList.remove('active');
        };

        // DATABASE OPERATIONS
        const linksRef = ref(database, 'settings/contact_links');
        
        onValue(linksRef, (snapshot) => {
            const data = snapshot.val() || {};
            document.getElementById('linkEmail').value = data.email || '';
            document.getElementById('linkInstagram').value = data.instagram || '';
            document.getElementById('linkTelegram').value = data.telegram || '';
        });

        window.saveContactLinks = async function() {
            const emailVal = document.getElementById('linkEmail').value.trim();
            const instaVal = document.getElementById('linkInstagram').value.trim();
            const teleVal = document.getElementById('linkTelegram').value.trim();

            try {
                await set(linksRef, { email: emailVal, instagram: instaVal, telegram: teleVal });
                showModal({
                    title: "Channels Updated",
                    message: "Official support and social links have been updated across all user devices dynamically.",
                    type: "info"
                });
            } catch (err) {
                showModal({
                    title: "Update Failed",
                    message: "Could not modify system configuration. Check your Database Rule permissions.",
                    type: "danger"
                });
            }
        };

        window.updateStatus = async function(ticketId, currentStatus) {
            const nextStatus = (currentStatus === 'open') ? 'resolved' : 'open';
            try {
                await update(ref(database, `support_tickets/${ticketId}`), { status: nextStatus });
            } catch (err) {
                console.error("Status error:", err);
            }
        };

        window.deleteTicket = function(ticketId) {
            showModal({
                title: "Delete Support Ticket?",
                message: "Are you sure you want to permanently erase this support inquiry entry from the database?",
                type: "danger",
                confirmText: "Erase Entry",
                showCancel: true,
                onConfirm: async () => {
                    try {
                        await remove(ref(database, `support_tickets/${ticketId}`));
                    } catch (err) {
                        console.error("Delete error:", err);
                    }
                }
            });
        };

        window.setFilter = function(filterValue) {
            currentFilter = filterValue;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            const targetBtn = document.getElementById(`btn-filter-${filterValue}`);
            if(targetBtn) targetBtn.classList.add('active');
            renderTickets();
        };

        const ticketsPathRef = ref(database, 'support_tickets');
        onValue(ticketsPathRef, (snapshot) => {
            allTickets = snapshot.val() || {};
            renderTickets();
        });

        function renderTickets() {
            const container = document.getElementById('ticketsWrapper');
            container.innerHTML = '';
            
            const ticketIds = Object.keys(allTickets).reverse();
            let visibleCount = 0;

            if (ticketIds.length === 0) {
                showEmptyView(container, "No Active Tickets", "No support tickets have been submitted yet.");
                return;
            }

            ticketIds.forEach(id => {
                const ticket = allTickets[id];
                const status = ticket.status || 'open';

                if (currentFilter !== 'all' && status !== currentFilter) return;
                visibleCount++;

                const rawDate = ticket.timestamp ? new Date(ticket.timestamp) : new Date();
                const formattedTime = rawDate.toLocaleString([], {
                    month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'
                });

                container.innerHTML += `
                    <div class="ticket-card">
                        <div class="ticket-top">
                            <div class="ticket-meta">
                                <h3>${escapeHtml(ticket.subject || 'General Inquiry')}</h3>
                                <p>Submitted: ${formattedTime}</p>
                            </div>
                            <span class="badge ${status === 'resolved' ? 'resolved' : 'open'}">${status}</span>
                        </div>
                        <div class="ticket-body">${escapeHtml(ticket.message || '')}</div>
                        <div class="ticket-actions">
                            <div class="user-details">
                                <span>${escapeHtml(ticket.fullName || 'Anonymous')}</span> &bull; 
                                <a href="mailto:${escapeHtml(ticket.email || '')}">${escapeHtml(ticket.email || 'No Email')}</a>
                            </div>
                            <div class="action-group">
                                <button class="btn-ui btn-resolve" onclick="updateStatus('${id}', '${status}')">
                                    Mark as ${status === 'open' ? 'Resolved' : 'Open'}
                                </button>
                                <button class="btn-ui btn-delete" onclick="deleteTicket('${id}')">Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            if (visibleCount === 0) {
                showEmptyView(container, "Filter Clean", `No tickets found matching '${currentFilter}' status.`);
            }
        }

        function showEmptyView(target, title, message) {
            target.innerHTML = `<div class="empty-state"><h3>${title}</h3><p>${message}</p></div>`;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
