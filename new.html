<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BirrGo - Premium Core Matrix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&family=Space+Grotesk:wght=500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="new.css">
    
    <style>
        /* Hide the body initially to prevent unauthorized layout flashing */
        body { display: none; }
    </style>

    <script>
        // --- SECURE AUTHENTICATION GUARD (TEMPORARILY BYPASSED) ---
        const sessionToken = localStorage.getItem('birrgo_admin_session') || sessionStorage.getItem('birrgo_admin_session');
        
        // I have commented out the redirect logic so the page will load regardless of your login status
        /*
        if (sessionToken !== "active_secure_admin") {
            window.location.replace("new1.html");
        } else {
        */
            
        // Authorized! Allow the body elements to render once DOM is ready
        document.documentElement.style.visibility = "visible";
        document.addEventListener("DOMContentLoaded", () => {
            document.body.style.display = "block";
        });
            
        /* } */ // End of commented-out security block
    </script>
</head>
<body>

    <div class="admin-container">
        <div class="admin-header">
            <h1>BirrGo Admin Dashboard</h1>
            <button class="btn-logout" id="exitAdminBtn">Logout Engine</button>
        </div>

        <div class="role-control-grid">
            <!-- PAYMENT ADMIN ACTION LINK (Updated to Brand Green) -->
            <a href="deposits.html" style="text-decoration: none;">
                <button class="role-nav-btn" style="background: linear-gradient(135deg, #059669 0%, #064e3b 100%); color: white; width: 100%;">
                    <span class="icon">💳</span> Payment Admin
                </button>
            </a>

            <!-- NEW PUSH NOTIFICATIONS GATEWAY (Updated to Dark Green) -->
            <a href="push.html" style="text-decoration: none;">
                <button class="role-nav-btn" style="background: linear-gradient(135deg, #047857 0%, #022c22 100%); color: white; width: 100%;">
                    <span class="icon">🔔</span> Push Notification
                </button>
            </a>

            <!-- NEW VERIFIED EMAIL & OTP SYSTEM BUTTON -->
            <a href="verified.html" style="text-decoration: none;">
                <button class="role-nav-btn" style="background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%); color: white; width: 100%;">
                    <span class="icon">🔑</span> Verify & OTP Portal
                </button>
            </a>

            <!-- NEW PREMIUM LOTTERY ADMIN BUTTON -->
            <a href="jet.html" style="text-decoration: none;">
                <button class="role-nav-btn" style="background: linear-gradient(135deg, #d4af37 0%, #aa7c11 100%); color: white; width: 100%;">
                    <span class="icon">🎟️</span> Premium Lottery
                </button>
            </a>

            <a href="user-profile.html" style="text-decoration: none;">
                <button class="role-nav-btn btn-role-stats" style="width: 100%;">
                    <span class="icon">👤</span> User Profile
                </button>
            </a>
            <a href="ecosystem.html" style="text-decoration: none;">
                <button class="role-nav-btn btn-role-ecosystem" style="width: 100%;">
                    <span class="icon">🌐</span> Ecosystem Matrix
                </button>
            </a>
            <a href="money.html" style="text-decoration: none;">
                <button class="role-nav-btn btn-role-money" style="width: 100%;">
                    <span class="icon">💰</span> Money Controller
                </button>
            </a>
            <a href="tasks.html" style="text-decoration: none;">
                <button class="role-nav-btn btn-role-tasks" style="width: 100%;">
                    <span class="icon">🔗</span> Enter Tasks
                </button>
            </a>
            <a href="socials.html" style="text-decoration: none;">
                <button class="role-nav-btn btn-role-news" style="background: linear-gradient(135deg, #4b0082 0%, #1a0033 100%); color: white; width: 100%;">
                    <span class="icon">📱</span> Social Links
                </button>
            </a>
            <a href="broadcast.html" style="text-decoration: none;">
                <button class="role-nav-btn btn-role-news" style="width: 100%;">
                    <span class="icon">📢</span> Broadcast & Promos
                </button>
            </a>
            <a href="security.html" style="text-decoration: none;">
                <button class="role-nav-btn btn-role-secure" style="width: 100%;">
                    <span class="icon">🛡️</span> System Security
                </button>
            </a>
        </div>

        <div id="stats-panel" class="metrics-grid">
            <div class="metric-card">
                <p>Global Active Users</p>
                <h2 id="metric-total-users">0</h2>
            </div>
            <div class="metric-card vault">
                <p>Total User Liabilities balance</p>
                <h2><span id="metric-total-vault">0.00</span> ETB</h2>
            </div>
            <div class="metric-card lottery">
                <p>Admin Capital Pool Balance</p>
                <h2><span id="metric-lottery-vault">0.00</span> ETB</h2>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, ref, onValue } from "./db.js";

        onValue(ref(db, 'users'), (snapshot) => {
            if (!snapshot.exists()) {
                document.getElementById('metric-total-users').innerText = '0';
                document.getElementById('metric-total-vault').innerText = '0.00';
                document.getElementById('metric-lottery-vault').innerText = '0.00';
                return;
            }
            let totalUsers = 0;
            let totalVaultLiabilities = 0;
            let foundAdminBalance = 0;
            const data = snapshot.val();

            Object.keys(data).forEach((phoneKey) => {
                totalUsers++;
                const profile = data[phoneKey];
                const balance = parseFloat(profile.walletBalance) || 0;
                const displayCard = profile.cardNumber || phoneKey;

                // Simple check based on phone or card containing 000000
                if (phoneKey.includes("000000") || (displayCard && displayCard.includes("000000"))) {
                    foundAdminBalance += balance; // Changed to += to aggregate correctly if multiple exist
                } else {
                    totalVaultLiabilities += balance;
                }
            });

            document.getElementById('metric-total-users').innerText = totalUsers;
            document.getElementById('metric-total-vault').innerText = totalVaultLiabilities.toFixed(2);
            document.getElementById('metric-lottery-vault').innerText = foundAdminBalance.toFixed(2);
        });

        // --- SECURE LOGOUT ---
        document.getElementById('exitAdminBtn').addEventListener('click', () => {
            localStorage.removeItem('birrgo_admin_session');
            sessionStorage.removeItem('birrgo_admin_session');
            window.location.replace("new1.html");
        });
    </script>
</body>
</html>
