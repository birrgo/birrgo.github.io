<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BirrGo - Electric Bajaj Matrix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Updated UI Color Palette to match the deep maroon/burgundy header */
            --primary-burgundy: #4a0011;
            --primary-gradient: linear-gradient(135deg, #4a0011 0%, #290008 100%);
            --green-gradient: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
            --gold-gradient: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --border-light: #e2e8f0;
            --card-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05), 0 4px 12px -2px rgba(0, 0, 0, 0.03);
            --border-radius-lg: 24px;
            --border-radius-md: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: -0.2px;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            background-color: #f1f5f9;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-view {
            width: 100%;
            height: 100dvh;
            max-width: 450px;
            background-color: #f1f5f9;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }

        /* Top Header */
        .app-header {
            width: 100%;
            background: var(--primary-burgundy);
            color: #ffffff;
            position: relative;
            padding: calc(8px + env(safe-area-inset-top)) 16px 18px 16px;
            z-index: 10;
        }

        .header-top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 3;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            text-decoration: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-back:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.25);
        }

        .header-logo-img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Title & Live Tracker Centered */
        .header-center-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-top: -6px;
            position: relative;
            z-index: 3;
        }

        .header-title h2 {
            font-size: 14px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        /* Live Tracker Pill */
        .live-tracker-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 4px;
            backdrop-filter: blur(4px);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            animation: pulse-animation 1.5s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 5px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .live-tracker-text {
            font-size: 9px;
            font-weight: 700;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* SVG Curve Cutout */
        .app-header-curve {
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            overflow: hidden;
            line-height: 0;
        }

        .app-header-curve svg {
            position: relative;
            display: block;
            width: calc(100% + 1.3px);
            height: 10px;
        }

        .app-header-curve .shape-fill {
            fill: #f1f5f9;
        }

        .app-content {
            flex: 1;
            overflow-y: auto;
            background-color: #f1f5f9;
            padding: 10px 16px 85px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: none;
        }
        .app-content::-webkit-scrollbar { display: none; }

        /* Metrics Summary Counter */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .metric-card {
            background: #ffffff;
            border-radius: 14px;
            padding: 12px;
            text-align: center;
            border: 1px solid var(--border-light);
            box-shadow: var(--card-shadow);
        }

        .metric-card.taken {
            border-left: 4px solid var(--primary-burgundy);
        }

        .metric-card.available {
            border-left: 4px solid #16a34a;
        }

        .metric-value {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-dark);
        }

        .metric-card.available .metric-value {
            color: #16a34a;
        }

        .metric-label {
            font-size: 10px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 6px;
            background: #e2e8f0;
            padding: 4px;
            border-radius: 12px;
        }

        .tab-btn {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 4px;
            font-size: 12px;
            font-weight: 800;
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tab-btn.active.taken-tab {
            background: var(--primary-burgundy);
            color: #ffffff;
            box-shadow: 0 2px 6px rgba(74, 0, 17, 0.25);
        }

        .tab-btn.active.available-tab {
            background: #16a34a;
            color: #ffffff;
            box-shadow: 0 2px 6px rgba(22, 163, 74, 0.25);
        }

        /* Search Box */
        .search-box-container {
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .search-input {
            width: 100%;
            height: 48px;
            border-radius: 12px;
            border: 1.5px solid var(--border-light);
            padding: 0 16px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            outline: none;
            background: #ffffff;
            box-shadow: var(--card-shadow);
            transition: border-color 0.2s ease;
        }

        .search-input:focus {
            border-color: var(--primary-burgundy);
        }

        .section-label-header {
            font-size: 12px;
            font-weight: 800;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            border-left: 3px solid var(--primary-burgundy);
            padding-left: 8px;
            margin-top: 4px;
        }

        .dashboard-list-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .dashboard-row-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            border: 1px solid var(--border-light);
            padding: 14px 16px;
            border-radius: var(--border-radius-md);
            box-shadow: var(--card-shadow);
        }

        .dashboard-row-card.available-card {
            border-left: 3.5px solid #16a34a;
            background: #f0fdf4;
        }

        .number-badge {
            background: var(--primary-gradient);
            color: #ffd700;
            font-weight: 800;
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 10px;
            min-width: 70px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(74, 0, 17, 0.2);
        }

        .number-badge.badge-available {
            background: var(--green-gradient);
            color: #ffffff;
            box-shadow: 0 2px 8px rgba(22, 163, 74, 0.25);
        }

        .owner-details {
            text-align: right;
        }

        .owner-phone {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .status-tag-available {
            font-size: 12px;
            font-weight: 800;
            color: #16a34a;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
        }

        .owner-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        
        .loading-text {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            padding: 30px 0;
            background: #ffffff;
            border-radius: 14px;
            border: 1px dashed var(--border-light);
        }

        /* Advertisements */
        .ad-container {
            position: relative;
            width: 100%;
            background: #ffffff;
            border: 1px dashed #cbd5e1;
            border-radius: 14px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.04);
        }

        .ad-container.fixed-bottom {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 418px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            z-index: 100;
        }

        .ad-tag {
            position: absolute;
            top: 4px;
            right: 8px;
            font-size: 9px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .ad-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="app-view">
        
        <header class="app-header">
            <div class="header-top-bar">
                <button class="btn-back" onclick="window.location.href='b.html'" aria-label="Back">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <img src="birrgo-logo.png" alt="BirrGo Logo" class="header-logo-img" />
            </div>

            <div class="header-center-content">
                <div class="header-title">
                    <h2>Electric Bajaj Matrix</h2>
                </div>
                <div class="live-tracker-badge">
                    <span class="pulse-dot"></span>
                    <span class="live-tracker-text">Live Tracker Active</span>
                </div>
            </div>

            <div class="app-header-curve">
                <svg viewBox="0 0 1200 120" preserveAspectRatio="none">
                    <path d="M0,0 C300,40 900,40 1200,0 L1200,120 L0,120 Z" class="shape-fill"></path>
                </svg>
            </div>
        </header>

        <div class="app-content">

            <div class="metrics-grid">
                <div class="metric-card taken">
                    <div class="metric-value" id="countTaken">0</div>
                    <div class="metric-label">Taken Positions</div>
                </div>
                <div class="metric-card available">
                    <div class="metric-value" id="countAvailable">0</div>
                    <div class="metric-label">Available Positions</div>
                </div>
            </div>

            <div class="filter-tabs">
                <button class="tab-btn taken-tab active" onclick="setFilter('taken', this)">Taken</button>
                <button class="tab-btn available-tab" onclick="setFilter('available', this)">Available</button>
            </div>

            <div class="search-box-container">
                <input type="text" id="dashboardSearch" class="search-input" placeholder="🔍 Search ticket number, card ID or time...">
            </div>

            <div class="section-label-header" id="sectionHeaderLabel">Allocated Numbers (Taken)</div>

            <div id="loadingIndicator" class="loading-text">Synchronizing allocation registry matrix...</div>

            <div class="dashboard-list-stack" id="dashboardStack"></div>

        </div>

        <div class="ad-container fixed-bottom">
            <span class="ad-tag">AD</span>
            <div class="ad-content">
                📢 <span>Advertisement Space</span>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRHoIZf1ZPR9m3YYTv-I9CfwyGqsSOMWo",
            authDomain: "birrgo-fdf7e.firebaseapp.com",
            databaseURL: "https://birrgo-fdf7e-default-rtdb.firebaseio.com",
            projectId: "birrgo-fdf7e",
            storageBucket: "birrgo-fdf7e.firebasestorage.app",
            messagingSenderId: "2317445154",
            appId: "1:2317445154:web:4275cbb0f46b28f64f827b"
        };

        const TOTAL_TICKETS = 2000;

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let masterAllPool = [];
        let currentFilter = 'taken';

        document.addEventListener('DOMContentLoaded', () => {
            fetchAllocatedRegistry();
            document.getElementById('dashboardSearch').addEventListener('input', applyFiltersAndRender);
        });

        function fetchAllocatedRegistry() {
            const ticketsRef = ref(db, 'lottery/electricbajaj/tickets');
            onValue(ticketsRef, (snapshot) => {
                document.getElementById('loadingIndicator').style.display = 'none';
                const data = snapshot.val() || {};

                const takenMap = new Map();
                Object.values(data).forEach(t => {
                    if (t.ticketNum) {
                        takenMap.set(parseInt(t.ticketNum), t);
                    }
                });

                masterAllPool = [];
                for (let i = 1; i <= TOTAL_TICKETS; i++) {
                    const paddedNum = i.toString().padStart(4, '0');
                    if (takenMap.has(i)) {
                        masterAllPool.push({
                            ticketNum: paddedNum,
                            status: 'taken',
                            ...takenMap.get(i)
                        });
                    } else {
                        masterAllPool.push({
                            ticketNum: paddedNum,
                            status: 'available',
                            cardSequence: null,
                            timestamp: null
                        });
                    }
                }

                updateSummaryMetrics();
                applyFiltersAndRender();
            });
        }

        function updateSummaryMetrics() {
            const takenCount = masterAllPool.filter(t => t.status === 'taken').length;
            const availableCount = TOTAL_TICKETS - takenCount;

            document.getElementById('countTaken').innerText = takenCount;
            document.getElementById('countAvailable').innerText = availableCount;
        }

        window.setFilter = function(filter, element) {
            currentFilter = filter;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');

            const labels = {
                'taken': 'Allocated Numbers (Taken)',
                'available': 'Unallocated Numbers (Available)'
            };
            document.getElementById('sectionHeaderLabel').innerText = labels[filter];

            applyFiltersAndRender();
        };

        function applyFiltersAndRender() {
            const query = document.getElementById('dashboardSearch').value.toLowerCase().trim();

            let list = masterAllPool.filter(item => item.status === currentFilter);

            if (query) {
                list = list.filter(t => {
                    const cardMatch = t.cardSequence ? t.cardSequence.toLowerCase().includes(query) : false;
                    const phoneMatch = t.phone ? t.phone.toLowerCase().includes(query) : false;
                    const numberMatch = t.ticketNum.toLowerCase().includes(query);
                    const timeMatch = t.timestamp ? t.timestamp.toLowerCase().includes(query) : false;
                    return cardMatch || phoneMatch || numberMatch || timeMatch;
                });
            }

            renderDashboardRegistry(list);
        }

        function renderDashboardRegistry(items) {
            const container = document.getElementById('dashboardStack');
            container.innerHTML = '';

            if(items.length === 0) {
                container.innerHTML = `<div style="text-align:center;font-size:13px;color:var(--text-muted);padding:30px;background:#fff;border-radius:14px;border:1px dashed var(--border-light);">No numbers match the current selection.</div>`;
                return;
            }

            const renderLimit = items.length > 200 ? 200 : items.length;

            for(let i = 0; i < renderLimit; i++) {
                const ticket = items[i];
                const card = document.createElement('div');
                
                if(ticket.status === 'taken') {
                    card.className = 'dashboard-row-card';
                    const rawIdentifier = ticket.cardSequence || ticket.phone || "0000000000000000";
                    const hiddenIdentifier = rawIdentifier.length > 10 
                        ? rawIdentifier.substring(0, 4) + "••••" + rawIdentifier.slice(-4)
                        : rawIdentifier.substring(0, 4) + "••••" + rawIdentifier.slice(-2);
                    
                    const visualTime = ticket.timestamp ? (ticket.timestamp.split(',')[1] || ticket.timestamp).trim() : "Registered";

                    card.innerHTML = `
                        <div class="number-badge">POS #${ticket.ticketNum}</div>
                        <div class="owner-details">
                            <div class="owner-phone">💳 CARD ID ${hiddenIdentifier}</div>
                            <div class="owner-meta">🕒 Registered at ${visualTime}</div>
                        </div>
                    `;
                } else {
                    card.className = 'dashboard-row-card available-card';
                    card.innerHTML = `
                        <div class="number-badge badge-available">POS #${ticket.ticketNum}</div>
                        <div class="owner-details">
                            <div class="status-tag-available">🟢 Available</div>
                            <div class="owner-meta">Not Reserved</div>
                        </div>
                    `;
                }
                
                container.appendChild(card);

                // Insert an ad unit after every 10th item
                if ((i + 1) % 10 === 0 && (i + 1) < renderLimit) {
                    const adCard = document.createElement('div');
                    adCard.className = 'ad-container';
                    adCard.innerHTML = `
                        <span class="ad-tag">AD</span>
                        <div class="ad-content">
                            📢 <span>Advertisement Space</span>
                        </div>
                    `;
                    container.appendChild(adCard);
                }
            }

            if (items.length > 200) {
                const footerNotice = document.createElement('div');
                footerNotice.style.cssText = "text-align:center;font-size:11px;color:var(--text-muted);padding:10px;";
                footerNotice.innerText = `Showing top 200 of ${items.length} numbers. Refine search to narrow down.`;
                container.appendChild(footerNotice);
            }
        }
    </script>
</body>
</html>
