<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BirrGo Admin - deposits.html</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="deposits.css">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <style>
        /* HEADER LAYOUT FOR CENTERED TITLE - SOLID WHITE */
        .top-nav {
            display: flex;
            flex-direction: column;
            width: 100%;
            background-color: #ffffff;
            border-bottom: 1px solid #e5e7eb;
        }

        .brand-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            padding: 12px 16px;
            background-color: #ffffff;
        }

        .brand-logo {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            margin: 0;
            text-align: center;
            font-size: 18px;
            font-weight: 800;
            color: #111827;
            white-space: nowrap;
        }

        .brand-logo span {
            color: var(--primary-burgundy, #8b0015);
        }

        /* CLEAR BACK BUTTON STYLING */
        .btn-back-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: #f3f4f6;
            color: #111827;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-size: 20px;
            font-weight: 900;
            transition: all 0.2s ease;
            z-index: 2;
        }
        .btn-back-icon:hover {
            background: #e5e7eb;
            transform: scale(1.05);
        }
        .btn-back-icon:active {
            transform: scale(0.95);
        }

        /* ALERTS TOP-RIGHT BUTTON */
        .btn-alert-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: #f3f4f6;
            color: #111827;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.2s ease;
            z-index: 2;
        }
        .btn-alert-icon:hover {
            background: #e5e7eb;
            transform: scale(1.05);
        }
        .btn-alert-icon:active {
            transform: scale(0.95);
        }

        /* CENTERED POP-UP MESSAGE BOX STYLING */
        .custom-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: #1e1e2d;
            color: #ffffff;
            padding: 20px 28px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 700;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-top: 5px solid var(--success-color, #10b981);
            min-width: 280px;
            max-width: 90%;
            text-align: center;
        }
        .custom-toast.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }
        .custom-toast .toast-icon {
            font-size: 22px;
        }
        
        .nav-badge {
            background-color: #ef4444;
            color: white;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 20px;
            margin-left: 6px;
            display: inline-block;
        }
        .nav-badge.zero {
            background-color: #9ca3af;
            display: none;
        }

        .nav-badge.unpaid-badge {
            background-color: #f59e0b;
        }
    </style>
</head>
<body>

    <header class="top-nav">
        <div class="brand-header">
            <!-- Left Side Back Button Redirecting to new.html -->
            <button class="btn-back-icon" onclick="window.location.href='new.html'" title="Go to New">
                &#8592;
            </button>
            
            <!-- Centered Header Title -->
            <div class="brand-logo">Birr<span>Go Admin Hub</span></div>

            <!-- Right Corner Alerts Icon Redirecting to alerts.html -->
            <button class="btn-alert-icon" onclick="window.location.href='alerts.html'" title="System Alerts">
                🔔
            </button>
        </div>
        
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('pane-unpaid', this)">
                Unpaid Orders <span id="tab-badge-unpaid" class="nav-badge zero unpaid-badge">0</span>
            </button>
            <button class="tab-btn" onclick="switchTab('pane-deposits', this)">
                Pending Reviews <span id="tab-badge-pending" class="nav-badge zero">0</span>
            </button>
            <button class="tab-btn" onclick="switchTab('pane-history', this)">History</button>
            <button class="tab-btn" onclick="switchTab('pane-chats', this)">
                Chat Services <span id="tab-badge-chats" class="nav-badge zero">0</span>
            </button>
        </div>
    </header>

    <div class="content-body">

        <!-- Tab Panel 1: Unpaid Orders -->
        <div id="pane-unpaid" class="tab-panel active">
            <div class="scrollable-content" id="unpaid-cards-container">
            </div>
        </div>

        <!-- Tab Panel 2: Pending Reviews -->
        <div id="pane-deposits" class="tab-panel">
            <div class="scrollable-content" id="tx-cards-container">
            </div>
        </div>

        <!-- Tab Panel 3: History -->
        <div id="pane-history" class="tab-panel">
            <div class="scrollable-content" id="history-cards-container">
            </div>
        </div>

        <!-- Tab Panel 4: Chat Services -->
        <div id="pane-chats" class="tab-panel">
            <div class="chat-mobile-wrapper">
                <div class="chat-user-selector" id="chat-list-view"></div>
                <div class="chat-active-window" id="chat-room-view">
                    <div class="chat-top-header">
                        <button class="btn-back" onclick="exitChatRoom()">← Back</button>
                        <div>
                            <h4 id="active-user-title" style="font-size: 14px; font-weight:800;">Selected Client</h4>
                            <p style="font-size: 10px; color: var(--text-muted);">Secure Client Tunnel</p>
                        </div>
                    </div>
                    <div class="chat-scroller" id="chat-messages-box"></div>
                    <div class="chat-footer">
                        <input type="text" id="chat-msg-input" class="form-control" placeholder="Type administrative response..." style="flex-grow: 1;">
                        <button class="btn-primary" id="send-chat-btn" style="width: auto; padding: 0 16px; height: 42px;">Send</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="modal" id="slipModal" onclick="closeSlip()">
        <div class="modal-body" onclick="event.stopPropagation()">
            <h4 style="margin-bottom: 8px; font-weight: 800;">P2P Verification Slip</h4>
            <img id="slipImg" src="" alt="Deposit Proof Receipt">
            <button class="btn-primary" style="background:#f3f4f6; color:#000;" onclick="closeSlip()">Close Frame</button>
        </div>
    </div>

    <!-- CENTERED POP-UP NOTIFICATION BOX -->
    <div class="custom-toast" id="system-toast">
        <span class="toast-icon">🚀</span>
        <span class="toast-text" id="toast-message">System updated successfully!</span>
    </div>

    <script type="module">
        import { db, ref, set, get, onValue, push, runTransaction } from './db.js';

        let activeUserId = '';
        let activeDepositList = {};

        window.showToast = function(message, type = 'success') {
            const toast = document.getElementById('system-toast');
            const textEl = document.getElementById('toast-message');
            
            textEl.innerText = message;
            if (type === 'success') {
                toast.style.borderTop = "5px solid #10b981";
                toast.querySelector('.toast-icon').innerText = '✅';
            } else if (type === 'error') {
                toast.style.borderTop = "5px solid #ef4444";
                toast.querySelector('.toast-icon').innerText = '❌';
            } else {
                toast.style.borderTop = "5px solid #f59e0b";
                toast.querySelector('.toast-icon').innerText = '🔔';
            }

            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        };

        window.switchTab = function(tabId, button) {
            document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            button.classList.add('active');
        };

        window.exitChatRoom = function() {
            activeUserId = '';
            document.getElementById('chat-room-view').classList.remove('active');
            document.getElementById('chat-list-view').classList.remove('hidden');
        };

        window.closeSlip = function() {
            document.getElementById('slipModal').style.display = 'none';
        };

        window.viewSlip = function(receiptUrl, fallbackRef) {
            const imgEl = document.getElementById('slipImg');
            imgEl.src = receiptUrl || `https://placehold.co/400x600/f3f4f6/8b0015?text=${fallbackRef}+Receipt`;
            document.getElementById('slipModal').style.display = 'flex';
        };

        function sendEmailNotification(subjectText, txDetails = {}) {
            get(ref(db, 'settings/email_config')).then((snapshot) => {
                const config = snapshot.val();
                if (!config) return;

                const targetEmail = config.alert_email_target;
                const publicKey = config.emailjs_public_key;
                const serviceId = config.emailjs_service_id;
                const templateId = config.emailjs_template_id;

                const emailjsInstance = window.emailjs;

                if (emailjsInstance && publicKey && serviceId && templateId && targetEmail) {
                    emailjsInstance.init({ publicKey: publicKey });
                    const templateParams = {
                        name: txDetails.name || txDetails.userId || 'Guest Client',
                        email: txDetails.email || txDetails.userId || 'N/A',
                        amount: txDetails.amount || '0',
                        subject: `⚠️ [BirrGo Alert] ${subjectText}`, 
                        method: txDetails.method || 'Unknown Gateway',
                        ref: txDetails.ref || 'N/A',
                        status: txDetails.status || 'Pending',
                        reason: txDetails.reason || 'None given'
                    };
                    emailjsInstance.send(serviceId, templateId, templateParams);
                }
            });
        }

        function listenToDeposits() {
            const container = document.getElementById('tx-cards-container'); 
            const unpaidContainer = document.getElementById('unpaid-cards-container'); 
            const historyContainer = document.getElementById('history-cards-container'); 
            
            const topMenuPendingBadge = document.getElementById('tab-badge-pending');
            const topMenuUnpaidBadge = document.getElementById('tab-badge-unpaid');

            let initialLoadComplete = false;
            const knownTxKeys = new Set();

            onValue(ref(db, 'deposits'), (snapshot) => {
                const data = snapshot.val() || {};
                activeDepositList = data; 
                
                let pendingCount = 0;
                let unpaidCount = 0;
                
                container.innerHTML = '';
                unpaidContainer.innerHTML = '';
                historyContainer.innerHTML = '';

                const keys = Object.keys(data).reverse();

                let totalUnpaidRendered = 0;
                let totalPendingRendered = 0;
                let totalHistoryRendered = 0;

                keys.forEach((dbKey) => {
                    const dep = data[dbKey];
                    const rawStatus = (dep.status || 'unpaid').toLowerCase();

                    if (rawStatus === 'pending') pendingCount++;
                    if (rawStatus === 'unpaid') unpaidCount++;

                    if (initialLoadComplete && !knownTxKeys.has(dbKey) && rawStatus === 'pending') {
                        get(ref(db, `users/${dep.userId}/fullName`)).then((nameSnap) => {
                            const clientFullName = nameSnap.val() || dep.userId;
                            sendEmailNotification("New Pending Order Placed", {
                                name: clientFullName,
                                email: dep.userId,
                                amount: dep.amount,
                                method: dep.method,
                                ref: dep.ref,
                                status: 'Pending'
                            });
                        }).catch(() => {});
                    }
                    knownTxKeys.add(dbKey);

                    const card = document.createElement('div');
                    card.className = 'mobile-tx-card';
                    card.id = `card-${dbKey}`;
                    
                    const isUnpaidCard = rawStatus === 'unpaid';
                    const isPendingCard = rawStatus === 'pending';
                    
                    let badgeStyle = '';
                    if (isPendingCard) {
                        badgeStyle = 'background:#fef3c7; color:#d97706;';
                    } else if (isUnpaidCard) {
                        badgeStyle = 'background:rgba(245, 158, 11, 0.15); color:#f59e0b;';
                    } else if (rawStatus === 'approved') {
                        badgeStyle = 'background:#d1fae5; color:#059669;';
                    } else if (rawStatus === 'rejected') {
                        badgeStyle = 'background:#fee2e2; color:#dc2626;';
                    } else if (rawStatus === 'cancelled') {
                        badgeStyle = 'background:#f3f4f6; color:#4b5563;';
                    }

                    let reasonDisplay = dep.reject_reason ? `<div class="tx-row" style="color:#ef4444;"><span style="font-weight:600;">Reason:</span> <span>${dep.reject_reason}</span></div>` : '';

                    const slipActionHtml = (isUnpaidCard || rawStatus === 'cancelled')
                        ? `<button class="btn-action-mobile" style="background:#f3f4f6; color:#9ca3af; cursor: not-allowed;" disabled>No Receipt</button>`
                        : `<button class="btn-action-mobile" style="background:#f3f4f6; color:#111;" id="view-slip-${dbKey}">View Receipt</button>`;

                    let actionPanelHtml = '';
                    if (isPendingCard) {
                        actionPanelHtml = `
                            <div class="tx-actions">
                                ${slipActionHtml}
                                <button class="btn-action-mobile" style="background:var(--success-color); color:white;" id="approve-${dbKey}">Approve</button>
                                <button class="btn-action-mobile" style="background:var(--danger-color); color:white;" id="reject-${dbKey}">Reject</button>
                            </div>
                        `;
                    } else {
                        actionPanelHtml = `
                            <div class="tx-actions">
                                ${slipActionHtml}
                            </div>
                        `;
                    }

                    card.innerHTML = `
                        <div class="tx-header">
                            <span class="tx-ref">${dep.ref || 'N/A'}</span>
                            <span style="font-size:10px; font-weight:800; padding:3px 8px; border-radius:6px; text-transform:uppercase; ${badgeStyle}">${dep.status || 'Unpaid'}</span>
                        </div>
                        <div class="tx-row">
                            <span style="color:var(--text-muted);">Gateway:</span>
                            <span style="font-weight:600;">${dep.method || 'N/A'}</span>
                        </div>
                        <div class="tx-row">
                            <span style="color:var(--text-muted);">Client Ref:</span>
                            <span style="font-weight:600;" id="client-info-${dbKey}">${dep.userId || 'N/A'}</span>
                        </div>
                        <div class="tx-row">
                            <span style="color:var(--text-muted);">Transfer Amount:</span>
                            <span style="font-weight:800; color:var(--primary-burgundy);">${parseFloat(dep.amount || 0).toLocaleString()} ETB</span>
                        </div>
                        ${reasonDisplay}
                        ${actionPanelHtml}
                    `;

                    if (isUnpaidCard) {
                        unpaidContainer.appendChild(card);
                        totalUnpaidRendered++;
                    } else if (isPendingCard) {
                        container.appendChild(card);
                        totalPendingRendered++;
                    } else {
                        historyContainer.appendChild(card);
                        totalHistoryRendered++;
                    }

                    if (dep.userId) {
                        get(ref(db, `users/${dep.userId}/fullName`)).then((nameSnap) => {
                            const fullName = nameSnap.val();
                            const infoEl = document.getElementById(`client-info-${dbKey}`);
                            if (infoEl && fullName) {
                                infoEl.innerHTML = `${fullName} <span style="font-weight:400; color:var(--text-muted); font-size:11px;">(${dep.userId})</span>`;
                            }
                        }).catch(() => {});
                    }

                    if (!isUnpaidCard && rawStatus !== 'cancelled') {
                        const viewBtn = document.getElementById(`view-slip-${dbKey}`);
                        if (viewBtn) {
                            viewBtn.onclick = () => window.viewSlip(dep.receiptUrl, dep.ref);
                        }
                    }
                    
                    if (isPendingCard) {
                        document.getElementById(`approve-${dbKey}`).onclick = () => {
                            updateTransactionStatus(dbKey, 'Approved', '');
                            window.showToast("Transaction Approved Successfully!");
                        };
                        document.getElementById(`reject-${dbKey}`).onclick = () => {
                            const reason = prompt("Why are you rejecting this transaction?");
                            if (reason === null) return; 
                            
                            updateTransactionStatus(dbKey, 'Rejected', reason.trim() || 'Invalid details provided');
                            window.showToast("Transaction Rejected & Logged!", "error");
                        };
                    }
                });

                if (totalUnpaidRendered === 0) {
                    unpaidContainer.innerHTML = `<p style="text-align: center; color: var(--text-muted); margin-top: 40px;">No unpaid requests active.</p>`;
                }
                if (totalPendingRendered === 0) {
                    container.innerHTML = `<p style="text-align: center; color: var(--text-muted); margin-top: 40px;">No pending reviews active.</p>`;
                }
                if (totalHistoryRendered === 0) {
                    historyContainer.innerHTML = `<p style="text-align: center; color: var(--text-muted); margin-top: 40px;">No transaction history found.</p>`;
                }

                topMenuPendingBadge.innerText = pendingCount;
                if (pendingCount > 0) topMenuPendingBadge.classList.remove('zero');
                else topMenuPendingBadge.classList.add('zero');

                topMenuUnpaidBadge.innerText = unpaidCount;
                if (unpaidCount > 0) topMenuUnpaidBadge.classList.remove('zero');
                else topMenuUnpaidBadge.classList.add('zero');

                initialLoadComplete = true;
            });
        }

        function updateTransactionStatus(dbKey, newStatus, reason = '') {
            const depositRef = ref(db, `deposits/${dbKey}`);
            get(depositRef).then((snapshot) => {
                const depositData = snapshot.val();
                if (!depositData) return;
                
                let updates = { status: newStatus };
                if (newStatus === 'Rejected' && reason) updates.reject_reason = reason;

                set(ref(db, `deposits/${dbKey}`), { ...depositData, ...updates }).then(() => {
                    const historyRecordRef = ref(db, `users/${depositData.userId}/transactions/${dbKey}`);
                    const formatLabel = newStatus === 'Approved' 
                        ? `⚡ Deposit Approved [${depositData.method}]` 
                        : `🎟️ Deposit Declined [${depositData.method}]`;

                    const dateObj = new Date();
                    const readableTimestamp = dateObj.toLocaleDateString([], {month:'short', day:'numeric'}) + ' ' + dateObj.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

                    set(historyRecordRef, {
                        title: formatLabel,
                        amount: parseFloat(depositData.amount || 0),
                        type: newStatus === 'Approved' ? 'income' : 'expense',
                        status: newStatus,
                        timestamp: readableTimestamp,
                        sortingTime: Date.now(),
                        orderRef: depositData.ref,
                        ...(reason && { reason: reason })
                    });

                    if (newStatus === 'Approved') {
                        const amountToAdd = parseFloat(depositData.amount || 0);
                        const userWalletRef = ref(db, `users/${depositData.userId}/walletBalance`);
                        runTransaction(userWalletRef, (currentBalance) => {
                            return (parseFloat(currentBalance) || 0) + amountToAdd;
                        });
                    }

                    get(ref(db, `users/${depositData.userId}/fullName`)).then((nameSnap) => {
                        const clientName = nameSnap.val() || depositData.userId;
                        sendEmailNotification(`Transaction ${newStatus}`, {
                            name: clientName,
                            email: depositData.userId,
                            amount: depositData.amount,
                            method: depositData.method,
                            ref: depositData.ref,
                            status: newStatus,
                            reason: reason || 'N/A'
                        });
                    }).catch(() => {});
                });
            });
        }

        function listenToChatUsers() {
            const listContainer = document.getElementById('chat-list-view');
            const topMenuChatsBadge = document.getElementById('tab-badge-chats');
            
            onValue(ref(db, 'chats'), (snapshot) => {
                listContainer.innerHTML = '';
                const chats = snapshot.val() || {};
                const userIds = Object.keys(chats);
                let totalUnreadCount = 0;

                if (userIds.length === 0) {
                    listContainer.innerHTML = `<p style="text-align: center; color: var(--text-muted); margin-top: 40px;">No customer chats active.</p>`;
                }

                userIds.forEach(userId => {
                    const chatData = chats[userId];
                    const messages = chatData.messages || {};
                    let userUnreadCount = 0;
                    Object.keys(messages).forEach(msgKey => {
                        const msg = messages[msgKey];
                        if (msg.sender === 'user' && msg.read !== true) {
                            userUnreadCount++;
                        }
                    });
                    totalUnreadCount += userUnreadCount;

                    const item = document.createElement('div');
                    item.className = 'chat-list-item';
                    item.onclick = () => openChatRoom(userId);
                    
                    const unreadBadgeHtml = userUnreadCount > 0 
                        ? `<span class="nav-badge" style="margin-left: auto; margin-right: 12px; display: inline-block;">${userUnreadCount}</span>` 
                        : '';

                    item.innerHTML = `
                        <div class="user-badge">${userId.slice(-3).toUpperCase()}</div>
                        <div style="flex-grow: 1;">
                            <h4 style="font-size:14px; font-weight:800;">${userId}</h4>
                            <p style="font-size:11px; color:var(--text-muted);">${userUnreadCount > 0 ? '💬 New message received' : 'Click to chat live'}</p>
                        </div>
                        ${unreadBadgeHtml}
                    `;
                    listContainer.appendChild(item);

                    if (activeUserId === userId && userUnreadCount > 0) {
                        clearUnreadMessages(userId, messages);
                    }
                });

                topMenuChatsBadge.innerText = totalUnreadCount;
                if (totalUnreadCount > 0) topMenuChatsBadge.classList.remove('zero');
                else topMenuChatsBadge.classList.add('zero');
            });
        }

        function clearUnreadMessages(userId, messages) {
            Object.keys(messages).forEach(msgKey => {
                const msg = messages[msgKey];
                if (msg.sender === 'user' && msg.read !== true) {
                    set(ref(db, `chats/${userId}/messages/${msgKey}/read`), true);
                }
            });
        }

        function openChatRoom(userId) {
            activeUserId = userId;
            document.getElementById('chat-list-view').classList.add('hidden');
            document.getElementById('chat-room-view').classList.add('active');
            document.getElementById('active-user-title').innerText = userId;

            const chatBox = document.getElementById('chat-messages-box');
            onValue(ref(db, `chats/${userId}/messages`), (snapshot) => {
                chatBox.innerHTML = '';
                const msgs = snapshot.val() || {};
                
                Object.keys(msgs).forEach(msgKey => {
                    const msg = msgs[msgKey];
                    const bubble = document.createElement('div');
                    bubble.className = `bubble ${msg.sender === 'user' ? 'received' : 'sent'}`;
                    bubble.innerText = msg.text;
                    chatBox.appendChild(bubble);

                    if (msg.sender === 'user' && msg.read !== true) {
                        set(ref(db, `chats/${userId}/messages/${msgKey}/read`), true);
                    }
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        function submitAdminMessage() {
            const input = document.getElementById('chat-msg-input');
            const val = input.value.trim();
            if (!val || !activeUserId) return;

            const newMsgRef = push(ref(db, `chats/${activeUserId}/messages`));
            set(newMsgRef, {
                sender: 'admin',
                text: val,
                timestamp: Date.now()
            }).then(() => {
                input.value = '';
            });
        }

        document.getElementById('send-chat-btn').onclick = submitAdminMessage;
        document.getElementById('chat-msg-input').onkeydown = (e) => {
            if (e.key === 'Enter') submitAdminMessage();
        };

        window.addEventListener('DOMContentLoaded', () => {
            listenToDeposits();
            listenToChatUsers();
        });
    </script>
</body>
</html>
