<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BirrGo - Admin News Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="new.css">
    
    <style>
        :root {
            --primary-burgundy: #800020;
            --primary-gradient: linear-gradient(135deg, #4a0012 0%, #800020 50%, #2b000a 100%);
            --accent-glow: rgba(128, 0, 32, 0.12);
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --border-light: #e2e8f0;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 4px 10px -2px rgba(0, 0, 0, 0.02);
            --danger-gradient: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: -0.2px;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #fafbfc;
            background-image: radial-gradient(rgba(148, 163, 184, 0.15) 1px, transparent 1px);
            background-size: 20px 20px;
            padding: 20px;
            min-height: 100vh;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
            color: var(--primary-burgundy);
            font-weight: 800;
            text-decoration: none;
            font-size: 13.5px;
            background: #ffffff;
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid var(--border-light);
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            transition: transform 0.15s ease;
        }
        .back-link:active { transform: scale(0.96); }

        .toast-banner {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 3000;
            padding: 12px 20px;
            border-radius: 12px;
            color: #ffffff;
            font-weight: 700;
            font-size: 13px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Modal Overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 2500;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }

        .modal-box {
            background: #ffffff;
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.12);
        }

        .modal-title { font-size: 17px; font-weight: 800; color: var(--text-dark); margin-bottom: 8px; }
        .modal-data-row { display: flex; justify-content: space-between; margin: 10px 0; background: var(--bg-light); padding: 10px; border-radius: 8px; font-size: 13px; }
        .modal-data-label { color: var(--text-muted); font-weight: 600; }
        .modal-data-value { font-weight: 800; color: var(--primary-burgundy); word-break: break-all; }

        /* Workspace Container */
        .workspace-card {
            width: 100%;
            max-width: 720px;
            background: #ffffff;
            border-radius: 20px;
            border: 1px solid var(--border-light);
            padding: 24px;
            box-shadow: var(--card-shadow);
            margin: 0 auto;
        }

        .header-brand-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 16px;
        }

        .brand-title-group { display: flex; align-items: center; gap: 12px; }
        .brand-logo-img { width: 32px; height: 32px; object-fit: contain; }

        .section-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary-burgundy);
        }

        .editing-banner {
            display: none;
            background: rgba(245, 158, 11, 0.1);
            border: 1px dashed #f59e0b;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 12.5px;
            font-weight: 700;
            color: #b45309;
            margin-bottom: 16px;
            justify-content: space-between;
            align-items: center;
        }

        .input-field-wrapper {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .input-field-wrapper label {
            font-size: 12px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-select, .admin-input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            font-size: 13.5px;
            font-weight: 600;
            color: var(--text-dark);
            background-color: var(--bg-light);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-select:focus, .admin-input:focus {
            border-color: var(--primary-burgundy);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        textarea.admin-input {
            min-height: 90px;
            resize: vertical;
        }

        /* Image Preview Box */
        .image-preview-container {
            display: none;
            margin-top: 8px;
            text-align: center;
            background: var(--bg-light);
            border: 1px dashed var(--border-light);
            padding: 10px;
            border-radius: 12px;
        }
        .image-preview-container img {
            max-width: 100%;
            max-height: 180px;
            border-radius: 8px;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .btn-row { display: flex; gap: 10px; margin-top: 10px; }

        .btn-admin-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.2s;
        }
        .btn-admin-action:active { transform: scale(0.97); }

        .btn-broadcast {
            flex: 1;
            background: var(--primary-gradient);
            color: #ffffff;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .btn-delete {
            background: var(--danger-gradient);
            color: #ffffff;
        }

        .btn-modal-close {
            background: var(--bg-light);
            color: var(--text-dark);
            border: 1px solid var(--border-light);
        }

        .filter-btn-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-bottom: 16px;
        }

        .filter-btn {
            padding: 8px 6px;
            font-size: 11px;
            font-weight: 800;
            border-radius: 10px;
            border: 1px solid var(--border-light);
            background: var(--bg-light);
            color: var(--text-muted);
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background: var(--primary-burgundy);
            color: #ffffff;
            border-color: var(--primary-burgundy);
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        .manage-news-card {
            background: var(--bg-light);
            border: 1px solid var(--border-light);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .manage-news-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .manage-btn-group {
            display: flex;
            gap: 8px;
            width: 100%;
            margin-top: 4px;
        }

        .btn-news-ctrl {
            flex: 1;
            padding: 8px 10px;
            font-size: 12px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            border: none;
            text-align: center;
            transition: opacity 0.2s;
        }
        .btn-news-ctrl:active { opacity: 0.8; }

        .btn-ctrl-edit { background: rgba(245, 158, 11, 0.15); color: #d97706; border: 1px solid rgba(245, 158, 11, 0.3); }
        .btn-ctrl-preview { background: rgba(59, 130, 246, 0.15); color: #2563eb; border: 1px solid rgba(59, 130, 246, 0.3); }
        .btn-ctrl-delete { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }

        .cancel-edit-btn {
            background: none;
            border: none;
            color: #b45309;
            font-weight: 800;
            cursor: pointer;
            text-decoration: underline;
            font-size: 12px;
        }

        .code-badge {
            background: #ffffff;
            color: #475569;
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 11px;
            border: 1px solid var(--border-light);
            display: inline-block;
        }

        .node-tag {
            font-size: 10px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }
        .node-tag-old { background: #e2e8f0; color: #475569; }
        .node-tag-new { background: #dbeafe; color: #1d4ed8; }
        .node-tag-promo { background: #fef3c7; color: #b45309; }
        
        .hidden-fields { display: none !important; }
    </style>
</head>
<body>

    <div class="toast-banner" id="adminToast">Action Completed Successfully</div>

    <div class="modal-overlay" id="customConfirmModal">
        <div class="modal-box">
            <h3 class="modal-title" id="modalTitleDisplay">Confirm Request</h3>
            <p id="modalDescriptionDisplay" style="font-size:13px; color:var(--text-muted); margin-bottom: 12px;"></p>
            <div id="modalDynamicDetails"></div>
            <div class="btn-row" style="margin-top: 16px;">
                <button class="btn-admin-action btn-modal-close" id="modalCancelBtn">Cancel</button>
                <button class="btn-admin-action" id="modalConfirmBtn">Proceed</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="previewNewsModal">
        <div class="modal-box">
            <h3 class="modal-title" id="previewModalTitle">News Article Preview</h3>
            <div id="previewModalDetails" style="margin-top: 12px;"></div>
            <div class="btn-row" style="margin-top: 16px;">
                <button class="btn-admin-action btn-modal-close" style="width: 100%;" id="closePreviewBtn">Close Preview</button>
            </div>
        </div>
    </div>

    <div class="workspace-card">
        <a href="new.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Back to Dashboard
        </a>

        <div class="header-brand-row">
            <div class="brand-title-group">
                <img class="brand-logo-img" src="birrgo-logo.png" alt="BirrGo Logo" onerror="this.style.display='none'">
                <h3 class="section-title">News Manager & Editor</h3>
            </div>
        </div>

        <div class="editing-banner" id="editingBanner">
            <span>✏️ Mode: Editing Post (<strong id="editingNewsCode"></strong>)</span>
            <button class="cancel-edit-btn" id="cancelEditBtn">Cancel Edit</button>
        </div>
        
        <div class="input-field-wrapper">
            <label>Target Category</label>
            <select class="form-select" id="postCategory">
                <option value="All Updates">1. All Updates (General Feed Post)</option>
                <option value="System Releases">2. System Releases (Version Update Post)</option>
                <option value="Promo Rewards">3. Promo Rewards (Standard Announcement News)</option>
                <option value="Promo Code News">4. Promo Code News (Claimable Gift Code)</option>
            </select>
        </div>

        <div id="standardFormFields">
            <div class="input-field-wrapper">
                <label>News Search Code</label>
                <input class="admin-input" type="text" id="newsCustomCode" placeholder="e.g. N-101 (Leave blank to auto-generate)" style="text-transform: uppercase;">
            </div>

            <div class="input-field-wrapper">
                <label>Broadcast Title</label>
                <input class="admin-input" type="text" id="newsTitle" placeholder="e.g. System Upgrade Live!">
            </div>

            <!-- Image Link Field positioned centrally between Title & Content -->
            <div class="input-field-wrapper">
                <label>🖼️ Cover Image / Banner URL (Optional)</label>
                <input class="admin-input" type="url" id="newsImageUrl" placeholder="https://example.com/banner.jpg">
                <div class="image-preview-container" id="imagePreviewBox">
                    <img id="imagePreviewElement" src="" alt="Image Preview" onerror="this.parentElement.style.display='none'">
                </div>
            </div>

            <div class="input-field-wrapper">
                <label>Broadcast Message Content</label>
                <textarea class="admin-input" id="newsMessage" placeholder="Type article content or update detail..."></textarea>
            </div>

            <div style="background: var(--bg-light); border: 1px solid var(--border-light); padding: 14px; border-radius: 12px; margin-bottom: 16px;">
                <p style="font-size: 11.5px; font-weight: 800; color: var(--primary-burgundy); text-transform: uppercase; margin-bottom: 10px;">
                    🔗 Action Link & Button (Optional)
                </p>
                <div class="input-field-wrapper">
                    <label>Target Action URL (Link)</label>
                    <input class="admin-input" type="url" id="newsRedirectUrl" placeholder="https://example.com or Leave Blank">
                </div>
                <div class="input-field-wrapper" style="margin-bottom: 0;">
                    <label>Action Button Label</label>
                    <input class="admin-input" type="text" id="newsButtonLabel" placeholder="e.g. Open Link, Instant View, Download Now">
                </div>
            </div>
        </div>

        <div id="promoFormFields" class="hidden-fields">
            <div style="background: #fef3c7; border: 1px solid rgba(245, 158, 11, 0.3); padding: 16px; border-radius: 12px; margin-bottom: 16px;">
                <p style="font-size: 12px; font-weight: 800; color: #b45309; text-transform: uppercase; margin-bottom: 12px;">
                    🎁 Promo Code Setup (Saves under Global Campaign)
                </p>
                
                <div class="input-field-wrapper">
                    <label>Promo Code Text</label>
                    <input class="admin-input" type="text" id="promoCode" placeholder="e.g. BIRR2026, BONUS100" style="text-transform: uppercase;">
                </div>

                <div class="input-field-wrapper">
                    <label>Number of Users Allowed to Claim</label>
                    <input class="admin-input" type="number" id="promoMaxClaims" placeholder="e.g. 50">
                </div>

                <div class="input-field-wrapper" style="margin-bottom: 0;">
                    <label>Win Amount Per User (ETB / Birr)</label>
                    <input class="admin-input" type="number" id="promoRewardAmount" placeholder="e.g. 100">
                </div>
            </div>
        </div>

        <div class="btn-row" style="margin-bottom: 24px;">
            <button class="btn-admin-action btn-broadcast" id="publishNewsBtn">
                <span id="buttonText">Publish Feed Item</span>
            </button>
            <button class="btn-admin-action btn-delete" id="deleteAllCategoriesBtn" style="width: auto; padding: 0 16px;">Purge All News</button>
        </div>

        <div style="border-top: 1px dashed var(--border-light); padding-top:20px;">
            <h3 class="section-title" style="font-size: 16px; color: var(--text-dark); margin-bottom: 12px;">Manage News & Promo Codes</h3>
            
            <div class="filter-btn-grid">
                <button class="filter-btn active" data-filter="ALL">1. All Items</button>
                <button class="filter-btn" data-filter="All Updates">2. News Feed</button>
                <button class="filter-btn" data-filter="System Releases">3. Releases</button>
                <button class="filter-btn" data-filter="Promo">4. Promo Codes</button>
            </div>

            <div id="manageNewsCardsContainer"></div>
        </div>
    </div>

    <script type="module">
        import { db, ref, onValue, push, set, remove, update } from "./db.js";

        let res = null;
        let oldNewsState = {};
        let newNewsState = {};
        let globalPromoState = {};
        let currentEditingKey = null;
        let currentEditingNode = 'newNews';
        let activeCategoryFilter = 'ALL';

        const categorySelect = document.getElementById('postCategory');
        categorySelect.addEventListener('change', (e) => {
            const isPromoCodeOption = e.target.value === 'Promo Code News';
            document.getElementById('standardFormFields').classList.toggle('hidden-fields', isPromoCodeOption);
            document.getElementById('promoFormFields').classList.toggle('hidden-fields', !isPromoCodeOption);
        });

        // Live image preview listener
        const imageUrlInput = document.getElementById('newsImageUrl');
        const imagePreviewBox = document.getElementById('imagePreviewBox');
        const imagePreviewElement = document.getElementById('imagePreviewElement');

        imageUrlInput.addEventListener('input', (e) => {
            const url = e.target.value.trim();
            if(url) {
                imagePreviewElement.src = url;
                imagePreviewBox.style.display = 'block';
            } else {
                imagePreviewBox.style.display = 'none';
            }
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeCategoryFilter = btn.getAttribute('data-filter');
                render();
            });
        });

        function openModal(t, d, m, c, tx) {
            document.getElementById('modalTitleDisplay').innerText = t; 
            document.getElementById('modalDescriptionDisplay').innerText = d;
            document.getElementById('modalDynamicDetails').innerHTML = `<div class="modal-data-row"><span class="modal-data-label">${m[0].label}</span><span class="modal-data-value">${m[0].value}</span></div>`;
            document.getElementById('modalConfirmBtn').className = "btn-admin-action " + c; 
            document.getElementById('modalConfirmBtn').innerText = tx;
            document.getElementById('customConfirmModal').classList.add('active'); 
            return new Promise(r => res = r);
        }
        
        document.getElementById('modalConfirmBtn').addEventListener('click', () => { if(res) res(true); document.getElementById('customConfirmModal').classList.remove('active'); });
        document.getElementById('modalCancelBtn').addEventListener('click', () => { if(res) res(false); document.getElementById('customConfirmModal').classList.remove('active'); });
        document.getElementById('closePreviewBtn').addEventListener('click', () => { document.getElementById('previewNewsModal').classList.remove('active'); });

        function triggerAdminAlert(m, s=true) {
            const t = document.getElementById('adminToast'); 
            t.innerText = m;
            t.style.background = s ? 'linear-gradient(135deg, #10b981 0%, #059669 100%)' : 'linear-gradient(135deg, #ef4444 0%, #dc2626 100%)';
            t.style.display = 'block'; 
            setTimeout(() => t.style.display='none', 3500);
        }

        onValue(ref(db, 'news'), snapshot => { 
            oldNewsState = snapshot.val() || {}; 
            render(); 
        }, error => console.warn("Legacy 'news' Node Error:", error));

        onValue(ref(db, 'newNews'), snapshot => { 
            newNewsState = snapshot.val() || {}; 
            render(); 
        }, error => console.error("Database 'newNews' Connection Error:", error));

        onValue(ref(db, 'globalPromoCampaign'), snapshot => { 
            globalPromoState = snapshot.val() || {}; 
            render(); 
        }, error => console.warn("Global Promo Node Error:", error));

        function render() {
            const container = document.getElementById('manageNewsCardsContainer'); 
            container.innerHTML = ''; 
            
            const combined = [];

            Object.keys(oldNewsState).forEach(k => {
                combined.push({ key: k, node: 'news', data: oldNewsState[k] });
            });

            Object.keys(newNewsState).forEach(k => {
                combined.push({ key: k, node: 'newNews', data: newNewsState[k] });
            });

            combined.sort((a, b) => (b.data.timestamp || 0) - (a.data.timestamp || 0));

            let renderedItemsCount = 0;

            // Render all promo codes under `globalPromoCampaign`
            if (activeCategoryFilter === 'ALL' || activeCategoryFilter === 'Promo') {
                if (typeof globalPromoState === 'object' && globalPromoState !== null) {
                    Object.keys(globalPromoState).forEach(k => {
                        const item = globalPromoState[k];
                        if (item && item.code) {
                            renderedItemsCount++;
                            container.innerHTML += `
                                <div class="manage-news-card">
                                    <div class="manage-news-header">
                                        <div>
                                            <span class="code-badge">${item.code}</span>
                                            <strong style="margin-left:6px; font-size:14px; color:var(--text-dark);">Global Promo (${item.rewardAmount || 0} Birr)</strong>
                                        </div>
                                        <span class="node-tag node-tag-promo">Global Promo</span>
                                    </div>
                                    <p style="font-size:12px; color:var(--text-muted);">
                                        Claims: <strong>${item.currentClaimCount || 0} / ${item.maxClaims || 0} Users</strong> | Win: <strong>${item.rewardAmount || 0} ETB</strong>
                                    </p>
                                    <div class="manage-btn-group">
                                        <button class="btn-news-ctrl btn-ctrl-delete del-btn" data-key="${k}" data-node="globalPromoCampaign">Delete Promo Code</button>
                                    </div>
                                </div>`;
                        }
                    });
                }
            }

            // Render Standard Feed News Items
            combined.forEach(itemObj => { 
                const item = itemObj.data; 
                const k = itemObj.key;
                const nodeName = itemObj.node;
                const newsCode = item.newsCode || item.code || 'N-NONE';
                const tagClass = nodeName === 'news' ? 'node-tag-old' : 'node-tag-new';
                const itemCategory = item.category || 'All Updates';

                let isMatch = false;
                if (activeCategoryFilter === 'ALL') isMatch = true;
                else if (activeCategoryFilter === 'Promo' && (itemCategory === 'Promo Rewards' || itemCategory === 'Promo Code News')) isMatch = true;
                else if (itemCategory === activeCategoryFilter) isMatch = true;

                if (isMatch) {
                    renderedItemsCount++;
                    container.innerHTML += `
                        <div class="manage-news-card">
                            <div class="manage-news-header">
                                <div>
                                    <span class="code-badge">${newsCode}</span>
                                    <strong style="margin-left:6px; font-size:14px; color:var(--text-dark);">${item.title || item.newsTitle || 'Untitled'}</strong>
                                </div>
                                <span class="node-tag ${tagClass}">${nodeName}</span>
                            </div>
                            <div style="font-size:12px; color:var(--text-muted);">Category: <strong>${itemCategory}</strong></div>
                            <div class="manage-btn-group">
                                <button class="btn-news-ctrl btn-ctrl-edit edit-btn" data-key="${k}" data-node="${nodeName}">Edit News</button>
                                <button class="btn-news-ctrl btn-ctrl-preview preview-btn" data-key="${k}" data-node="${nodeName}">Preview News</button>
                                <button class="btn-news-ctrl btn-ctrl-delete del-btn" data-key="${k}" data-node="${nodeName}">Delete News</button>
                            </div>
                        </div>`; 
                }
            });

            if (renderedItemsCount === 0) {
                container.innerHTML = `<div style="text-align:center; color:var(--text-muted); padding:20px; font-weight:600; font-size:13px;">No items found for '${activeCategoryFilter}'.</div>`;
            }
            
            // Delete Handlers
            container.querySelectorAll('.del-btn').forEach(btn => btn.addEventListener('click', async () => {
                const k = btn.getAttribute('data-key');
                const nodeName = btn.getAttribute('data-node');
                const path = k ? `${nodeName}/${k}` : nodeName;

                if(!await openModal("Confirm Deletion", `Permanently remove entry from '${path}'?`, [{label:"Target:", value:path}], "btn-delete", "Delete Now")) return;
                try {
                    await remove(ref(db, path)); 
                    triggerAdminAlert("Entry deleted successfully!");
                    if(currentEditingKey === k) resetFormState();
                } catch(e) {
                    triggerAdminAlert("Deletion failed: " + e.message, false);
                }
            }));

            // Edit Handlers
            container.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', () => {
                const k = btn.getAttribute('data-key');
                const nodeName = btn.getAttribute('data-node');
                const item = (nodeName === 'news') ? oldNewsState[k] : newNewsState[k];
                
                if(!item) return;

                currentEditingKey = k;
                currentEditingNode = nodeName;
                
                document.getElementById('postCategory').value = item.category || 'All Updates';
                document.getElementById('standardFormFields').classList.remove('hidden-fields');
                document.getElementById('promoFormFields').classList.add('hidden-fields');

                document.getElementById('newsCustomCode').value = item.newsCode || item.code || '';
                document.getElementById('newsTitle').value = item.title || item.newsTitle || '';
                
                const imgUrl = item.imageUrl || item.image || '';
                document.getElementById('newsImageUrl').value = imgUrl;
                if(imgUrl) {
                    imagePreviewElement.src = imgUrl;
                    imagePreviewBox.style.display = 'block';
                } else {
                    imagePreviewBox.style.display = 'none';
                }

                document.getElementById('newsMessage').value = item.content || item.message || '';
                document.getElementById('newsRedirectUrl').value = item.link || item.redirectUrl || '';
                document.getElementById('newsButtonLabel').value = item.buttonLabel || '';

                document.getElementById('editingBanner').style.display = 'flex';
                document.getElementById('editingNewsCode').innerText = `${item.newsCode || k} [${nodeName}]`;
                document.getElementById('buttonText').innerText = "Update Existing Post";
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }));

            // Preview Handlers
            container.querySelectorAll('.preview-btn').forEach(btn => btn.addEventListener('click', () => {
                const k = btn.getAttribute('data-key');
                const nodeName = btn.getAttribute('data-node');
                const item = (nodeName === 'news') ? oldNewsState[k] : newNewsState[k];

                if(!item) return;

                const imgHtml = (item.imageUrl || item.image) 
                    ? `<div style="text-align:center; margin:10px 0;"><img src="${item.imageUrl || item.image}" style="max-width:100%; border-radius:8px; max-height:160px; object-fit:cover;"></div>` 
                    : '';

                document.getElementById('previewModalDetails').innerHTML = `
                    <div class="modal-data-row"><span class="modal-data-label">Code:</span><span class="modal-data-value">${item.newsCode || item.code || 'N/A'}</span></div>
                    <div class="modal-data-row"><span class="modal-data-label">Title:</span><span class="modal-data-value">${item.title || item.newsTitle || 'Untitled'}</span></div>
                    <div class="modal-data-row"><span class="modal-data-label">Category:</span><span class="modal-data-value">${item.category || 'General'}</span></div>
                    ${imgHtml}
                    <div class="modal-data-row"><span class="modal-data-label">Link:</span><span class="modal-data-value">${item.link || item.redirectUrl || 'None'}</span></div>
                    <div style="background:var(--bg-light); padding:12px; border-radius:10px; margin-top:10px; font-size:13px; color:var(--text-dark); max-height:120px; overflow-y:auto; line-height:1.4;">
                        ${item.content || item.message || 'No content message provided.'}
                    </div>
                `;
                document.getElementById('previewNewsModal').classList.add('active');
            }));
        }

        document.getElementById('cancelEditBtn').addEventListener('click', resetFormState);

        function resetFormState() {
            currentEditingKey = null;
            currentEditingNode = 'newNews';
            document.getElementById('editingBanner').style.display = 'none';
            document.getElementById('buttonText').innerText = "Publish Feed Item";
            
            document.getElementById('postCategory').value = 'All Updates';
            document.getElementById('standardFormFields').classList.remove('hidden-fields');
            document.getElementById('promoFormFields').classList.add('hidden-fields');

            document.getElementById('newsCustomCode').value = '';
            document.getElementById('newsTitle').value = '';
            document.getElementById('newsImageUrl').value = '';
            imagePreviewBox.style.display = 'none';
            document.getElementById('newsMessage').value = '';
            document.getElementById('newsRedirectUrl').value = '';
            document.getElementById('newsButtonLabel').value = '';

            document.getElementById('promoCode').value = '';
            document.getElementById('promoMaxClaims').value = '';
            document.getElementById('promoRewardAmount').value = '';
        }

        // Publish Action
        document.getElementById('publishNewsBtn').addEventListener('click', async () => {
            const cat = document.getElementById('postCategory').value;
            const publishBtn = document.getElementById('publishNewsBtn');
            const buttonText = document.getElementById('buttonText');

            publishBtn.disabled = true;

            const timestampWithTime = new Date().toLocaleString('en-US', {
                month: 'short', day: 'numeric', year: 'numeric',
                hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true
            });

            // Option 4: Add Promo Code into `globalPromoCampaign` node
            if (cat === 'Promo Code News') {
                const promoCode = document.getElementById('promoCode').value.trim().toUpperCase();
                const maxClaims = parseInt(document.getElementById('promoMaxClaims').value, 10);
                const rewardAmount = parseFloat(document.getElementById('promoRewardAmount').value);

                if (!promoCode || isNaN(maxClaims) || isNaN(rewardAmount)) {
                    publishBtn.disabled = false;
                    return triggerAdminAlert("Please enter Promo Code, User Limit, and Win Amount.", false);
                }

                buttonText.innerText = "Creating Promo Code...";

                const promoPayload = {
                    code: promoCode,
                    maxClaims: maxClaims,
                    rewardAmount: rewardAmount,
                    currentClaimCount: 0,
                    createdAt: timestampWithTime,
                    timestamp: Date.now()
                };

                try {
                    await set(push(ref(db, 'globalPromoCampaign')), promoPayload);
                    triggerAdminAlert(`Global Promo Code [${promoCode}] Created Successfully!`);
                    resetFormState();
                } catch(err) {
                    console.error(err);
                    triggerAdminAlert("Failed to save promo: " + err.message, false);
                } finally {
                    publishBtn.disabled = false;
                }
                return;
            }

            // Options 1, 2, 3: Standard News Feed Posts
            const title = document.getElementById('newsTitle').value.trim();
            const imageUrl = document.getElementById('newsImageUrl').value.trim();
            const message = document.getElementById('newsMessage').value.trim();
            const redirectUrl = document.getElementById('newsRedirectUrl').value.trim();
            const buttonLabel = document.getElementById('newsButtonLabel').value.trim();
            let newsCode = document.getElementById('newsCustomCode').value.trim().toUpperCase();

            if(!title || !message) {
                publishBtn.disabled = false;
                return triggerAdminAlert("Title and content message are required.", false);
            }

            if (!newsCode) {
                newsCode = `N-${Math.floor(1000 + Math.random() * 9000)}`;
            }
            
            buttonText.innerText = currentEditingKey ? "Updating..." : "Publishing...";

            const newsDataPayload = { 
                newsCode: newsCode,
                category: cat, 
                title: title, 
                imageUrl: imageUrl,
                content: message, 
                link: redirectUrl,
                buttonLabel: buttonLabel,
                updatedAt: timestampWithTime,
                timestamp: Date.now()
            };

            try {
                if (currentEditingKey) {
                    await update(ref(db, `${currentEditingNode}/${currentEditingKey}`), newsDataPayload);
                    triggerAdminAlert(`Updated [${newsCode}] in ${currentEditingNode}!`);
                } else {
                    newsDataPayload.date = timestampWithTime;
                    await set(push(ref(db, 'newNews')), newsDataPayload);
                    triggerAdminAlert(`Published to newNews! Code: [${newsCode}]`);
                }

                resetFormState();

            } catch (err) {
                console.error("Database Save Error:", err);
                triggerAdminAlert("Database save failed: " + err.message, false);
            } finally {
                publishBtn.disabled = false;
            }
        });

        // Purge All Database Records
        document.getElementById('deleteAllCategoriesBtn').addEventListener('click', async () => {
            if(!await openModal("CRITICAL PURGE", "Permanently delete ALL news and promo entries across database?", [{label:"Target Nodes:", value:"news, newNews, globalPromoCampaign"}], "btn-delete", "Delete Everything")) return;
            try {
                await remove(ref(db, 'news')); 
                await remove(ref(db, 'newNews')); 
                await remove(ref(db, 'globalPromoCampaign')); 
                resetFormState();
                triggerAdminAlert("Flushed all database items!");
            } catch(e) {
                triggerAdminAlert("Purge failed: " + e.message, false);
            }
        });
    </script>
</body>
</html>
