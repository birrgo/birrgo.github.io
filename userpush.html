<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BirrGo - Enable Notifications</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; 
            background: transparent;
            padding: 20px; 
            margin: 0;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .card { 
            background: #ffffff; 
            padding: 32px 24px; 
            border-radius: 24px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); 
            width: 100%; 
            max-width: 340px; 
            border-top: 6px solid #800020; 
            text-align: center;
            box-sizing: border-box; 
        }
        h2 { 
            color: #0f172a; 
            margin-top: 0; 
            font-size: 22px; 
            font-weight: 800;
            margin-bottom: 12px; 
            letter-spacing: -0.5px;
        }
        p { 
            color: #64748b; 
            font-size: 14px; 
            line-height: 1.6; 
            font-weight: 500;
            margin-bottom: 24px; 
        }
        button { 
            background: #800020; 
            color: white; 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 12px; 
            font-size: 15px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.2s ease;
            display: none; /* Shown once initialization finishes */
            box-shadow: 0 4px 12px rgba(128, 0, 32, 0.2);
        }
        button:hover { background: #66001a; }
        button:active { transform: scale(0.98); }
        #status { 
            margin-top: 18px; 
            font-weight: 700; 
            font-size: 13px; 
            color: #f59e0b; 
        }
        .icon { 
            font-size: 48px; 
            margin-bottom: 16px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">🔔</div>
    <h2>Stay Updated</h2>
    <p>Enable push notifications to receive instant alerts for deposits, cash received, and secure account updates.</p>
    
    <div id="status">Connecting to BirrGo servers...</div>
    <button id="subscribe-btn" onclick="window.promptSubscription()">Enable Notifications</button>
</div>

<!-- Firebase App SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCRHoIZf1ZPR9m3YYTv-I9CfwyGqsSOMWo",
    authDomain: "birrgo-fdf7e.firebaseapp.com",
    databaseURL: "https://birrgo-fdf7e-default-rtdb.firebaseio.com",
    projectId: "birrgo-fdf7e",
    storageBucket: "birrgo-fdf7e.firebasestorage.app",
    messagingSenderId: "2317445154",
    appId: "1:2317445154:web:4275cbb0f46b28f64f827b",
    measurementId: "G-24X13TZ43D"
  };

  // Static fallback App ID in case database read fails or network disconnects
  const HARDCODED_APP_ID = "afd5dff1-2571-4ac3-bbd9-14afe75c84c1";

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);
  
  const statusDiv = document.getElementById('status');
  const subscribeBtn = document.getElementById('subscribe-btn');

  // Helper to extract string App ID regardless of database structure
  function extractAppId(val) {
      if (!val) return null;
      if (typeof val === 'string') return val;
      return val.appId || val.app_id || val.id || null;
  }

  async function getAppIdFromFirebase() {
      // Primary check at /onesignal
      try {
          const snapshot = await get(ref(database, 'onesignal'));
          if (snapshot.exists()) {
              const id = extractAppId(snapshot.val());
              if (id) return id;
          }
      } catch (err) {
          console.warn("Primary path read failed:", err.message);
      }

      // Secondary check at /config
      try {
          const snapshot = await get(ref(database, 'config'));
          if (snapshot.exists()) {
              const val = snapshot.val();
              const id = extractAppId(val.onesignal) || extractAppId(val);
              if (id) return id;
          }
      } catch (err) {
          console.warn("Secondary path read failed:", err.message);
      }

      // Fallback ID
      return HARDCODED_APP_ID;
  }

  async function initPushNotifications() {
      const appId = await getAppIdFromFirebase();

      if (!appId) {
          statusDiv.innerText = "Error: Notification App ID missing.";
          statusDiv.style.color = "#ef4444";
          return;
      }

      // Inject OneSignal v16 Script
      const script = document.createElement('script');
      script.src = "https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js";
      script.defer = true;
      document.head.appendChild(script);

      window.OneSignalDeferred = window.OneSignalDeferred || [];
      window.OneSignalDeferred.push(async function(OneSignal) {
          await OneSignal.init({
              appId: appId,
              notifyButton: { enable: false },
              allowLocalhostAsSecureOrigin: true
          });

          if (!OneSignal.Notifications.isPushSupported()) {
              statusDiv.innerText = "Push notifications not supported on this browser.";
              statusDiv.style.color = "#ef4444";
              return;
          }

          // Check if permission is already granted
          if (OneSignal.Notifications.permission) {
              statusDiv.innerText = "✔️ You are subscribed to notifications!";
              statusDiv.style.color = "#10b981";
              subscribeBtn.style.display = "none";
          } else {
              statusDiv.innerText = "Ready to connect.";
              statusDiv.style.color = "#10b981";
              subscribeBtn.style.display = "block";
          }

          // Listen for user granting permission
          OneSignal.Notifications.addEventListener("permissionChange", function(granted) {
              if (granted) {
                  statusDiv.innerText = "✔️ You are subscribed to notifications!";
                  statusDiv.style.color = "#10b981";
                  subscribeBtn.style.display = "none";
              }
          });
      });
  }

  initPushNotifications();

  // Explicit window attachment ensures button click works across modular scope
  window.promptSubscription = function() {
      window.OneSignalDeferred.push(async function(OneSignal) {
          try {
              // Trigger Native Permission Prompt
              await OneSignal.Notifications.requestPermission();
          } catch (error) {
              console.error("Native request failed, trying slidedown prompt:", error);
              try {
                  await OneSignal.Slidedown.promptPush();
              } catch (e) {
                  console.error("Slidedown failed:", e);
              }
          }
      });
  };
</script>

</body>
</html>
