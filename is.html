<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BirrGo Premium — iPhone 17 Analytics Matrix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-burgundy: #4a0011;
            --primary-gradient: linear-gradient(135deg, #600016 0%, #30000a 100%);
            --gold-gradient: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            --text-dark: #111827;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --border-light: #e2e8f0;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.03), 0 8px 16px -6px rgba(0, 0, 0, 0.02);
            --success-green: #10b981;
            --border-radius-md: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: -0.2px;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            background-color: #f1f5f9;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-view {
            width: 100%;
            height: 100dvh;
            max-width: 450px;
            background-color: #f1f5f9;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }

        /* Compact Top Navigation Curved Header */
        .app-header {
            width: 100%;
            background: var(--primary-burgundy);
            color: #ffffff;
            position: relative;
            padding: calc(10px + env(safe-area-inset-top)) 16px 24px 16px;
            z-index: 10;
        }

        .header-top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 3;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            text-decoration: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-back:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.3);
        }

        .header-logo-img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Title & Live Tracker Centered */
        .header-center-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-top: -6px;
            position: relative;
            z-index: 3;
        }

        .header-title h2 {
            font-size: 14px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        /* Live Tracker Pill */
        .live-tracker-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 4px;
            backdrop-filter: blur(4px);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            animation: pulse-animation 1.5s infinite;
        }

        @keyframes pulse-animation {
            0% {
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            }
            70% {
                box-shadow: 0 0 0 5px rgba(34, 197, 94, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
            }
        }

        .live-tracker-text {
            font-size: 9px;
            font-weight: 700;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Reduced Height Curved SVG Cutout */
        .app-header-curve {
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            overflow: hidden;
            line-height: 0;
        }

        .app-header-curve svg {
            position: relative;
            display: block;
            width: calc(100% + 1.3px);
            height: 15px;
        }

        .app-header-curve .shape-fill {
            fill: #f1f5f9;
        }

        .app-content {
            flex: 1;
            overflow-y: auto;
            background-color: #f1f5f9;
            padding: 10px 16px 85px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scrollbar-width: none;
            min-height: 0;
        }
        .app-content::-webkit-scrollbar { display: none; }

        .metrics-summary-card {
            background: var(--primary-gradient);
            color: #ffffff;
            padding: 20px 16px;
            border-radius: var(--border-radius-md);
            box-shadow: 0 12px 24px -6px rgba(74, 0, 17, 0.25);
            flex-shrink: 0;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        .metrics-summary-card p {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            opacity: 0.8;
            margin-bottom: 4px;
        }
        .metrics-summary-card h2 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            flex-shrink: 0;
        }

        .data-box {
            background: #ffffff;
            border: 1px solid var(--border-light);
            border-radius: var(--border-radius-md);
            padding: 14px 12px;
            box-shadow: var(--card-shadow);
        }
        .data-box p {
            font-size: 9px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .data-box h4 {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-dark);
        }

        .log-panel-box {
            background: #ffffff;
            border: 1px solid var(--border-light);
            border-radius: var(--border-radius-md);
            padding: 14px;
            flex: 1;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--card-shadow);
        }
        .log-title-bar {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .live-badge {
            font-size: 9px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-green);
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 700;
        }

        .ledger-scroll-container {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .ledger-scroll-container::-webkit-scrollbar { display: none; }

        .ledger-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 2px;
            border-bottom: 1px solid #f8fafc;
        }
        .ledger-row:last-child { border-bottom: none; }

        .ledger-meta {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .ledger-card-id {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-dark);
        }
        .ledger-timestamp {
            font-size: 10px;
            font-weight: 500;
            color: var(--text-muted);
        }
        .ledger-value-badge {
            font-size: 11px;
            font-weight: 800;
            background: var(--primary-gradient);
            color: #ffd700;
            padding: 4px 8px;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(74, 0, 17, 0.15);
        }

        /* Fixed Bottom Advertisement Container */
        .ad-container {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 418px;
            background: #ffffff;
            border: 1px dashed #cbd5e1;
            border-radius: 14px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            z-index: 100;
        }

        .ad-tag {
            position: absolute;
            top: 4px;
            right: 8px;
            font-size: 9px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .ad-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="app-view">
        
        <!-- Compact Top Navigation Curved Header -->
        <header class="app-header">
            <div class="header-top-bar">
                <button class="btn-back" onclick="window.location.href='i.html'" aria-label="Back">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <img src="birrgo-logo.png" alt="BirrGo Logo" class="header-logo-img" />
            </div>

            <!-- Title & Live Tracker Badge centered inside top curve -->
            <div class="header-center-content">
                <div class="header-title">
                    <h2>Metrics Matrix</h2>
                </div>
                <div class="live-tracker-badge">
                    <span class="pulse-dot"></span>
                    <span class="live-tracker-text">Live Tracker Active</span>
                </div>
            </div>

            <!-- Reduced Height Curved SVG Cutout -->
            <div class="app-header-curve">
                <svg viewBox="0 0 1200 120" preserveAspectRatio="none">
                    <path d="M0,0 C300,60 900,60 1200,0 L1200,120 L0,120 Z" class="shape-fill"></path>
                </svg>
            </div>
        </header>

        <div class="app-content">

            <div class="metrics-summary-card">
                <p>Gross Campaign Revenue</p>
                <h2 id="grossRevenueDisplay">0.00 Br</h2>
            </div>

            <div class="dashboard-grid">
                <div class="data-box">
                    <p>Total Positions Taken</p>
                    <h4 id="totalSoldDisplay">0</h4>
                </div>
                <div class="data-box">
                    <p>Pool Coverage</p>
                    <h4 id="coveragePercentDisplay">0.00%</h4>
                </div>
            </div>

            <div class="log-panel-box">
                <div class="log-title-bar">
                    <span>Audit Allocation Trail</span>
                    <span class="live-badge">REAL-TIME</span>
                </div>
                <div class="ledger-scroll-container" id="ledgerScrollFeed"></div>
            </div>

        </div>

        <!-- Fixed Bottom Advertisement Container -->
        <div class="ad-container">
            <span class="ad-tag">AD</span>
            <div class="ad-content">
                📢 <span>Advertisement Space</span>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRHoIZf1ZPR9m3YYTv-I9CfwyGqsSOMWo",
            authDomain: "birrgo-fdf7e.firebaseapp.com",
            databaseURL: "https://birrgo-fdf7e-default-rtdb.firebaseio.com",
            projectId: "birrgo-fdf7e",
            storageBucket: "birrgo-fdf7e.firebasestorage.app",
            messagingSenderId: "2317445154",
            appId: "1:2317445154:web:4275cbb0f46b28f64f827b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const totalPoolCapacity = 5000;
        const pricePerTicket = 200;

        const ticketsRef = ref(db, 'lottery/iphone17/tickets');
        onValue(ticketsRef, (snapshot) => {
            const dataMap = snapshot.val() || {};
            const items = Object.values(dataMap);
            const soldCount = items.length;

            // Mathematical Formulations
            const dynamicRevenue = soldCount * pricePerTicket;
            const absoluteCoverage = (soldCount / totalPoolCapacity) * 100;

            // DOM Mutations
            document.getElementById('grossRevenueDisplay').innerText = `${dynamicRevenue.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})} Br`;
            document.getElementById('totalSoldDisplay').innerText = soldCount;
            document.getElementById('coveragePercentDisplay').innerText = `${absoluteCoverage.toFixed(2)}%`;

            renderAuditTrail(items);
        });

        function renderAuditTrail(records) {
            const container = document.getElementById('ledgerScrollFeed');
            container.innerHTML = '';

            if(records.length === 0) {
                container.innerHTML = `<div style="text-align:center;font-size:12px;font-weight:600;color:var(--text-muted);padding:30px 10px;">AWAITING TRANSACTIONS INPUT PIPELINE...</div>`;
                return;
            }

            records.reverse().forEach(record => {
                if(parseInt(record.ticketNum) > totalPoolCapacity) return;

                const row = document.createElement('div');
                row.className = 'ledger-row';

                const rawCard = record.cardSequence || record.phone || "0000000000000000";
                const hiddenCard = rawCard.substring(0, 4) + "••••" + rawCard.slice(-4);
                const visualTime = record.timestamp ? record.timestamp.split(',')[1] || record.timestamp : "Just Now";

                row.innerHTML = `
                    <div class="ledger-meta">
                        <span class="ledger-card-id">CARD ID ${hiddenCard}</span>
                        <span class="ledger-timestamp">Registered at ${visualTime.trim()}</span>
                    </div>
                    <span class="ledger-value-badge">POS #${record.ticketNum}</span>
                `;
                container.appendChild(row);
            });
        }
    </script>
</body>
</html>
