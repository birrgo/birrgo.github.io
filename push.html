<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BirrGo - Admin Push Panel</title>
    
    <!-- Firebase Compat SDKs for Realtime Database -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #f4f6f9; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .top-nav { 
            width: 100%; 
            max-width: 420px; 
            display: flex; 
            justify-content: flex-start; 
            margin-bottom: 15px; 
            box-sizing: border-box; 
        }
        .back-btn { 
            background: #555; 
            color: white; 
            text-decoration: none; 
            padding: 8px 14px; 
            border-radius: 6px; 
            font-size: 14px; 
            font-weight: bold; 
            display: inline-flex; 
            align-items: center; 
            transition: background 0.2s; 
        }
        .back-btn:hover { background: #333; }
        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 420px; 
            border-top: 5px solid #8B0000; 
            margin-bottom: 20px; 
            box-sizing: border-box; 
        }
        h2 { color: #8B0000; margin-top: 0; font-size: 22px; }
        .section-title {
            font-size: 12px;
            font-weight: bold;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 20px;
            margin-bottom: 8px;
            border-bottom: 1px solid #eee;
            padding-bottom: 4px;
        }
        label { font-weight: bold; display: block; margin: 10px 0 4px; color: #333; font-size: 13px; }
        input, textarea { 
            width: 100%; 
            padding: 10px; 
            box-sizing: border-box; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            font-size: 14px; 
            margin-bottom: 5px;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus { border-color: #8B0000; outline: none; }
        button { 
            background: #8B0000; 
            color: white; 
            width: 100%; 
            padding: 12px; 
            border: none; 
            border-radius: 6px; 
            font-size: 15px; 
            font-weight: bold; 
            margin-top: 18px; 
            cursor: pointer; 
            transition: background 0.2s, opacity 0.2s;
        }
        button:hover { background: #660000; }
        button:disabled { background: #999; cursor: not-allowed; opacity: 0.7; }
        #status { 
            margin-top: 15px; 
            font-weight: 600; 
            text-align: center; 
            font-size: 14px; 
            word-break: break-word; 
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="top-nav">
    <a href="new.html" class="back-btn">← Back to Dashboard</a>
</div>

<div class="card">
    <h2>BirrGo Admin Panel</h2>
    <p style="font-size: 13px; color: #555; margin-bottom: 15px;">Send live push notifications directly to subscribers:</p>
    
    <form id="push-form" onsubmit="sendPush(event)" autocomplete="off">
        
        <!-- 1. NOTIFICATION DETAILS (TOP) -->
        <div class="section-title">Notification Content</div>

        <label for="title">Notification Title</label>
        <input type="text" id="title" placeholder="e.g., Cash Received! 💰" maxlength="100" required>

        <label for="message">Message Body</label>
        <textarea id="message" rows="3" placeholder="e.g., You received 500 Birr." maxlength="250" required></textarea>

        <label for="imageUrl">Image URL (Optional)</label>
        <input type="url" id="imageUrl" placeholder="https://birrgo.online/banner.jpg">

        <button type="submit" id="send-btn">Broadcast Notification</button>

        <!-- 2. ONESIGNAL CREDENTIALS (BOTTOM) -->
        <div class="section-title">OneSignal API Credentials (Database Synced)</div>

        <label for="appId">OneSignal App ID</label>
        <input type="text" id="appId" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" required>

        <label for="restApiKey">REST API Key</label>
        <input type="password" id="restApiKey" placeholder="os_v2_app_..." required>

    </form>
    
    <div id="status"></div>
</div>

<script>
  // ----------------------------------------------------
  // FIREBASE CONFIGURATION
  // ----------------------------------------------------
  const firebaseConfig = {
      databaseURL: "https://birrgo-fdf7e-default-rtdb.firebaseio.com" // Your Realtime DB URL
  };

  // Initialize Firebase
  if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
  }
  const db = firebase.database();

  // Load saved credentials from Realtime Database on page load
  document.addEventListener("DOMContentLoaded", () => {
      showStatus("Connecting to Realtime Database...", "#f59e0b");
      
      db.ref('config/onesignal').once('value')
          .then((snapshot) => {
              const data = snapshot.val();
              if (data) {
                  if (data.appId) document.getElementById('appId').value = data.appId;
                  if (data.restApiKey) document.getElementById('restApiKey').value = data.restApiKey;
                  showStatus("Loaded credentials from Realtime Database.", "#10b981");
              } else {
                  showStatus("Please enter your OneSignal API credentials below.", "#333");
              }
          })
          .catch((error) => {
              console.error("Firebase read error:", error);
              showStatus("Ready (DB offline fallback active)", "#333");
          });
  });

  async function sendPush(event) {
      event.preventDefault();

      const appId = document.getElementById('appId').value.trim();
      const restApiKey = document.getElementById('restApiKey').value.trim();
      const title = document.getElementById('title').value.trim();
      const message = document.getElementById('message').value.trim();
      const rawImageUrl = document.getElementById('imageUrl').value.trim();

      if (!appId || !restApiKey || !title || !message) {
          showStatus('All required fields must be filled!', '#d9534f');
          return;
      }

      toggleFormState(true);
      showStatus('Broadcasting via OneSignal API...', '#f59e0b');

      // 1. Sync & Save Credentials to Firebase Realtime Database
      db.ref('config/onesignal').set({
          appId: appId,
          restApiKey: restApiKey,
          updatedAt: Date.now()
      }).catch(err => console.error("Database sync error:", err));

      // 2. Construct OneSignal payload
      const payload = {
          app_id: appId,
          included_segments: ["Total Subscriptions"],
          headings: { en: title },
          contents: { en: message },
          url: "https://birrgo.online",
          ttl: 86400,
          priority: 10
      };

      if (rawImageUrl && rawImageUrl.startsWith('http')) {
          payload.big_picture = rawImageUrl;
          payload.chrome_web_image = rawImageUrl;
          payload.firefox_icon = rawImageUrl;
      }

      try {
          // 3. Send direct push notification
          const response = await fetch("https://onesignal.com/api/v1/notifications", {
              method: "POST",
              headers: {
                  "Content-Type": "application/json; charset=utf-8",
                  "Authorization": `Basic ${restApiKey}`
              },
              body: JSON.stringify(payload)
          });

          const responseData = await response.json();

          if (response.ok && responseData.id) {
              const count = responseData.recipients ?? 0;
              showStatus(`🚀 Success! Notification sent to ${count} recipient${count === 1 ? '' : 's'}.`, '#10b981');
              
              // 4. Write delivery log to Firebase Realtime Database
              db.ref('logs/notifications').push({
                  id: responseData.id,
                  title: title,
                  message: message,
                  recipientsCount: count,
                  domain: 'birrgo.online',
                  sentAt: Date.now()
              }).catch(err => console.error("Log error:", err));

              // Clear message fields upon success
              document.getElementById('title').value = '';
              document.getElementById('message').value = '';
              document.getElementById('imageUrl').value = '';
          } else {
              let errorMsg = responseData.errors 
                  ? (Array.isArray(responseData.errors) ? responseData.errors[0] : JSON.stringify(responseData.errors))
                  : `HTTP Error ${response.status}`;
              showStatus(`OneSignal Rejected: ${errorMsg}`, '#d9534f');
          }
      } catch (error) {
          console.error("Broadcast Error:", error);
          showStatus(`Network Error: ${error.message}`, '#d9534f');
      } finally {
          toggleFormState(false);
      }
  }

  function showStatus(text, color) {
      const statusDiv = document.getElementById('status');
      statusDiv.style.color = color;
      statusDiv.innerText = text;
  }

  function toggleFormState(disabled) {
      document.getElementById('appId').disabled = disabled;
      document.getElementById('restApiKey').disabled = disabled;
      document.getElementById('title').disabled = disabled;
      document.getElementById('message').disabled = disabled;
      document.getElementById('imageUrl').disabled = disabled;
      document.getElementById('send-btn').disabled = disabled;
  }
</script>

</body>
</html>
