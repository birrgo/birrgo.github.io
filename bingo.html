<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BIRRGO Scratch & Win</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-burgundy: #6B001B;
            --primary-gradient: linear-gradient(135deg, #7A001E 0%, #3F000E 100%);
            --accent-glow: rgba(107, 0, 27, 0.06);
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --border-light: #e2e8f0;
            --card-shadow: 0 8px 20px -4px rgba(0, 0, 0, 0.05);
            --success-green: #10b981;
            --danger-red: #ef4444;
            --border-radius-lg: 20px;
            --border-radius-md: 14px;
            --ad-banner-height: 56px;
            --font-family-byd: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-family-byd);
            letter-spacing: -0.01em;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            background-color: #f1f5f9;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-view {
            width: 100%;
            height: 100dvh;
            max-width: 450px;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        /* Custom Curved Wave Header Design */
        .top-red-header-wrapper {
            position: relative;
            background-color: #ffffff;
            flex-shrink: 0;
            z-index: 10;
        }

        .top-red-header {
            background: var(--primary-burgundy);
            padding: calc(12px + env(safe-area-inset-top, 0px)) 16px 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #ffffff;
            position: relative;
        }

        .btn-header-back {
            width: 32px;
            height: 32px;
            background: #ffffff;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-burgundy);
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.12);
        }

        .header-title-text {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            text-align: center;
            flex: 1;
            color: #ffffff;
        }

        .header-logo-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            border-radius: 50%;
            background: #ffffff;
            padding: 2px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.12);
        }

        .header-wave-svg {
            display: block;
            width: 100%;
            height: 20px;
            fill: var(--primary-burgundy);
            margin-top: -1px;
        }

        .app-content {
            flex: 1;
            overflow-y: auto;
            background-color: #f8fafc;
            padding: 12px 14px calc(var(--ad-banner-height) + env(safe-area-inset-bottom, 0px) + 20px) 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: none;
            min-height: 0;
        }
        .app-content::-webkit-scrollbar { display: none; }

        .card-container {
            background: #ffffff;
            border-radius: var(--border-radius-md);
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-light);
            padding: 24px 16px;
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 280px;
        }

        .game-status-text {
            color: var(--text-dark);
            font-size: 0.9rem;
            margin-bottom: 16px;
            font-weight: 700;
            width: 100%;
        }

        #initPlaySection {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
        }

        #initPlaySection .btn {
            max-width: 280px;
        }

        .grid-container {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 8px;
        }

        .grid-item {
            aspect-ratio: 1 / 1; 
            position: relative;
            background-color: #ffffff;
            border-radius: 12px;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid var(--border-light);
        }

        .progressive-blur-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(10px);
            opacity: 0.6;
            transition: filter 0.4s ease-out, opacity 0.4s ease-out;
            will-change: filter, opacity;
        }
        .progressive-blur-img.loaded {
            filter: blur(0);
            opacity: 1;
        }

        .scratch-foil {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 10px;
            background-color: #ffffff; 
            background-image: url('33274.jpg');
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 1);
            transition: transform 0.25s ease, opacity 0.25s ease;
            user-select: none;
        }

        .grid-item.revealed .scratch-foil {
            transform: scale(0.6);
            opacity: 0;
            pointer-events: none; 
        }

        /* Fixed Bottom Advertisement Container */
        .fixed-ad-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: calc(var(--ad-banner-height) + env(safe-area-inset-bottom, 0px));
            padding-bottom: env(safe-area-inset-bottom, 0px);
            background: #ffffff;
            border-top: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            padding-left: 12px;
            padding-right: 12px;
            z-index: 100;
        }

        .ad-box-inner {
            width: 100%;
            height: 38px;
            border: 1px dashed #cbd5e1;
            border-radius: 8px;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
        }

        .ad-tag { position: absolute; top: 2px; right: 6px; font-size: 8px; font-weight: 800; color: #94a3b8; }
        .ad-text { font-size: 11px; font-weight: 700; color: #64748b; display: flex; align-items: center; gap: 6px; }
        .ad-icon { width: 14px; height: 14px; fill: #6B001B; }

        /* Centered Modal Overlays */
        .modal-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 5000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-box {
            background: #ffffff;
            width: 100%;
            max-width: 360px;
            border-radius: var(--border-radius-lg);
            padding: 22px 18px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            transform: scale(0.92);
            transition: transform 0.25s ease;
        }
        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 6px;
        }
        .modal-title.win { color: var(--success-green); }
        .modal-title.lose { color: var(--danger-red); }

        .modal-logo-count {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 14px;
            line-height: 1.4;
            font-weight: 500;
        }

        .modal-prize-box {
            background-color: #fdf2f4;
            border: 1px dashed var(--primary-burgundy);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .modal-prize-amount {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary-burgundy);
        }

        .input-field {
            width: 100%;
            height: 42px;
            background: var(--bg-light);
            border: 1px solid var(--border-light);
            border-radius: var(--border-radius-md);
            padding: 0 12px;
            font-size: 16px;
            font-weight: 700;
            outline: none;
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 16px;
        }
        .input-field:focus {
            border-color: var(--primary-burgundy);
            background: #ffffff;
        }

        /* Action Buttons Grid in Modal */
        .modal-action-stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .btn {
            background: var(--primary-gradient);
            color: white;
            border: none;
            height: 44px;
            font-size: 0.88rem;
            font-weight: 700;
            border-radius: var(--border-radius-md);
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 10px rgba(107, 0, 27, 0.2);
            transition: transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn:active { transform: scale(0.98); }
        .btn.btn-dark { background: #0f172a; box-shadow: none; }

        .btn-close-modal {
            height: 40px;
            background: #f1f5f9;
            color: var(--text-dark);
            border: none;
            border-radius: var(--border-radius-md);
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: background 0.15s ease;
        }
        .btn-close-modal:active { background: #e2e8f0; }

        .toast {
            position: absolute;
            top: calc(16px + env(safe-area-inset-top, 0px));
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: #0f172a;
            color: white;
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.25s ease;
            z-index: 8000;
            width: 85%;
            text-align: center;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { background: var(--danger-red); }
        .toast.success { background: var(--success-green); }
    </style>
</head>
<body>

    <div class="app-view">
        <div id="toastNotification" class="toast"></div>

        <!-- Custom Curved Header with Wave SVG & BirrGo Logo -->
        <div class="top-red-header-wrapper">
            <div class="top-red-header">
                <a href="lottery.html" class="btn-header-back" aria-label="Go Back">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </a>
                <span class="header-title-text">Scratch & Win</span>
                <img src="birrgo-logo.png" alt="BirrGo Logo" class="header-logo-img">
            </div>
            <!-- Wavy Curve SVG -->
            <svg class="header-wave-svg" viewBox="0 0 500 40" preserveAspectRatio="none">
                <path d="M0,0 L500,0 L500,10 C350,38 150,38 0,10 Z"></path>
            </svg>
        </div>

        <div class="app-content">
            <div class="card-container">
                <div id="gameInstruction" class="game-status-text">Unlock card to start playing!</div>
                
                <!-- Centered Get Started Button Container -->
                <div id="initPlaySection">
                    <button class="btn" onclick="startPlayWorkflow()">Get Started (20 Birr)</button>
                </div>

                <div id="gridContainer" class="grid-container" style="display: none;"></div>
            </div>
        </div>

        <!-- Fixed Bottom Non-Movable Advertisement Space Container -->
        <div class="fixed-ad-container" id="fixedAdContainer">
            <div class="ad-box-inner">
                <span class="ad-tag">AD</span>
                <div class="ad-text">
                    <svg class="ad-icon" viewBox="0 0 24 24">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <span>Advertisement Space</span>
                </div>
            </div>
        </div>

        <!-- Centered Result & Payment Gateway Modal -->
        <div id="gameModal" class="modal-overlay">
            <div class="modal-box">
                <div id="modalTitle" class="modal-title">Confirm Ticket</div>
                <div id="modalLogos" class="modal-logo-count">1 ticket price is 20 Birr. Enter your 6-digit PIN to pay and play.</div>
                
                <input type="password" id="userPinInput" maxlength="6" inputmode="numeric" class="input-field" placeholder="••••••">

                <div class="modal-prize-box" id="modalPrizeBox" style="display: none;">
                    <div style="font-size: 0.75rem; color: #888; text-transform: uppercase; font-weight: 700;">Your Payout</div>
                    <div id="modalPrize" class="modal-prize-amount">0 Birr</div>
                </div>

                <div class="modal-action-stack">
                    <button id="modalActionBtn" class="btn" onclick="processTicketPurchase()">Pay 20 Birr & Play</button>
                    <button id="modalCloseBtn" class="btn-close-modal" onclick="closeGameModal()">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, update, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRHoIZf1ZPR9m3YYTv-I9CfwyGqsSOMWo",
            authDomain: "birrgo-fdf7e.firebaseapp.com",
            databaseURL: "https://birrgo-fdf7e-default-rtdb.firebaseio.com",
            projectId: "birrgo-fdf7e",
            storageBucket: "birrgo-fdf7e.firebasestorage.app",
            messagingSenderId: "2317445154",
            appId: "1:2317445154:web:4275cbb0f46b28f64f827b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const ticketCost = 20;
        const loseImages = ['1.jpg', '2.jpg', '3.jpg', '4.jpg', '5.jpg'];
        const winImage = '6.jpg';
        const totalItems = 12;

        let logosFound = 0;
        let revealedItems = 0;
        let activeGameState = false; 
        let pinVerifiedThisSession = false;
        let activeUserPhone = localStorage.getItem('auth_session_phone');
        let completeRawCardSequence = "";
        let currentRoundWinValue = 0;
        let targetLogosCount = 0;

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toastNotification');
            toast.className = `toast ${type}`;
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function normalizePhoneNumber(phoneStr) {
            return phoneStr ? phoneStr.replace(/\D/g, '') : "";
        }

        function setupProgressiveBlur(imgElement) {
            if (imgElement.complete) {
                imgElement.classList.add('loaded');
            } else {
                imgElement.addEventListener('load', () => imgElement.classList.add('loaded'));
            }
        }

        window.onload = async () => {
            if(!activeUserPhone) {
                window.location.href = "new2.html";
                return;
            }
            const cleanPhone = normalizePhoneNumber(activeUserPhone);
            const final6Reversed = cleanPhone.slice(-6).split('').reverse().join('');
            completeRawCardSequence = cleanPhone + final6Reversed;

            try {
                const directCheckSnap = await get(ref(db, `users/${completeRawCardSequence}`));
                if (!directCheckSnap.exists()) {
                    const usersSnapshot = await get(ref(db, 'users'));
                    if (usersSnapshot.exists()) {
                        usersSnapshot.forEach((child) => {
                            const ud = child.val();
                            if ((ud.phoneNumber && normalizePhoneNumber(ud.phoneNumber).includes(cleanPhone)) ||
                                (ud.phone && normalizePhoneNumber(ud.phone).includes(cleanPhone))) {
                                completeRawCardSequence = child.key;
                            }
                        });
                    }
                }
            } catch (err) { console.error(err); }
        };

        window.closeGameModal = function() {
            document.getElementById('gameModal').classList.remove('active');
            // If user clicked close after completing the game round, redirect back to lottery.html
            if (revealedItems === totalItems) {
                window.location.href = "lottery.html";
            }
        };

        window.startPlayWorkflow = function() {
            if (pinVerifiedThisSession) {
                executeTicketTransaction("");
            } else {
                showPaymentPromptModal();
            }
        };

        window.showPaymentPromptModal = function() {
            activeGameState = false;
            
            document.getElementById('gridContainer').innerHTML = '';
            document.getElementById('gridContainer').style.display = 'none';
            document.getElementById('initPlaySection').style.display = 'flex';
            document.getElementById('gameInstruction').innerText = "Unlock card to start playing!";
            
            document.getElementById('modalTitle').innerText = "Confirm Ticket";
            document.getElementById('modalTitle').className = "modal-title";
            document.getElementById('modalLogos').innerText = "1 ticket price is 20 Birr. Enter your 6-digit PIN to pay and play.";
            
            const pinInput = document.getElementById('userPinInput');
            pinInput.style.display = "block";
            pinInput.value = ""; 
            
            document.getElementById('modalPrizeBox').style.display = "none";
            
            const actionBtn = document.getElementById('modalActionBtn');
            actionBtn.innerText = "Pay 20 Birr & Play";
            actionBtn.className = "btn";
            
            document.getElementById('gameModal').classList.add('active');
            setTimeout(() => pinInput.focus(), 300);
        }

        function calculateSecureOutcome() {
            const chance = Math.random() * 100;

            if (chance < 24) {
                return { logos: 1, payout: 0 };         // 24% -> 0 Birr
            } else if (chance < 74) {
                return { logos: 2, payout: 10 };        // 50% -> 10 Birr
            } else if (chance < 84) {
                return { logos: 3, payout: 20 };        // 10% -> 20 Birr
            } else if (chance < 89) {
                return { logos: 4, payout: 50 };        // 5%  -> 50 Birr
            } else if (chance < 94) {
                return { logos: 5, payout: 100 };       // 5%  -> 100 Birr
            } else if (chance < 95) {
                return { logos: 6, payout: 1000 };      // 1%  -> 1,000 Birr
            } else if (chance < 96) {
                return { logos: 7, payout: 5000 };      // 1%  -> 5,000 Birr
            } else if (chance < 97) {
                return { logos: 8, payout: 10000 };     // 1%  -> 10,000 Birr
            } else if (chance < 98) {
                return { logos: 9, payout: 50000 };     // 1%  -> 50,000 Birr
            } else {
                return { logos: 10, payout: 100000 };   // 2%  -> 100,000 Birr
            }
        }

        window.processTicketPurchase = async function() {
            if(!activeGameState && document.getElementById('userPinInput').style.display !== "none") {
                const enteredPin = document.getElementById('userPinInput').value.trim();
                if(!enteredPin || enteredPin.length !== 6) {
                    showToast("Please enter your valid 6-digit security PIN.", "error");
                    return;
                }
                executeTicketTransaction(enteredPin);
            } else {
                // If clicked from the results modal (e.g. "Play Again" or "Try Again")
                document.getElementById('gameModal').classList.remove('active');
                startPlayWorkflow();
            }
        };

        async function executeTicketTransaction(enteredPin) {
            const actionBtn = document.getElementById('modalActionBtn');
            actionBtn.disabled = true;
            actionBtn.innerText = "Processing...";

            try {
                const usersSnapshot = await get(ref(db, 'users'));
                if(!usersSnapshot.exists() || !usersSnapshot.hasChild(completeRawCardSequence)) {
                    showToast("User details profile missing.", "error");
                    resetModalBtn();
                    return;
                }

                const allUsers = usersSnapshot.val();
                const userData = allUsers[completeRawCardSequence];

                if (!pinVerifiedThisSession) {
                    if (userData.securityPin !== enteredPin && userData.pin !== enteredPin) {
                        showToast("Invalid security PIN verification.", "error");
                        resetModalBtn();
                        return;
                    }
                    pinVerifiedThisSession = true;
                }

                let clearBalance = parseFloat(userData.walletBalance || userData.balance || 0);
                if(clearBalance < ticketCost) {
                    showToast(`Insufficient balance! Current: ${clearBalance} Birr`, "error");
                    resetModalBtn();
                    return;
                }

                const secureResult = calculateSecureOutcome();
                targetLogosCount = secureResult.logos;
                currentRoundWinValue = secureResult.payout;

                let adminNodeKey = null;
                Object.keys(allUsers).forEach((key) => {
                    if (key.includes("000000") || (allUsers[key].cardNumber && allUsers[key].cardNumber.includes("000000"))) {
                        adminNodeKey = key;
                    }
                });

                const adjustedUserBalance = parseFloat((clearBalance - ticketCost + currentRoundWinValue).toFixed(2));
                const timestampStr = new Date().toLocaleString();
                const updates = {};

                updates[`users/${completeRawCardSequence}/walletBalance`] = adjustedUserBalance;
                if (userData.balance !== undefined) {
                    updates[`users/${completeRawCardSequence}/balance`] = adjustedUserBalance;
                }

                const ticketPushKey = push(ref(db, `users/${completeRawCardSequence}/tickets`)).key;
                updates[`users/${completeRawCardSequence}/tickets/${ticketPushKey}`] = {
                    type: "Bingo Scratch Ticket",
                    price: ticketCost,
                    payout: currentRoundWinValue,
                    timestamp: timestampStr
                };

                const txPushKey = push(ref(db, `users/${completeRawCardSequence}/transactions`)).key;
                updates[`users/${completeRawCardSequence}/transactions/${txPushKey}`] = {
                    title: "BINGO SCRATCH TICKET ENTRY",
                    amount: -ticketCost,
                    type: "expense",
                    timestamp: timestampStr
                };

                if(currentRoundWinValue > 0) {
                    const winTxPushKey = push(ref(db, `users/${completeRawCardSequence}/transactions`)).key;
                    updates[`users/${completeRawCardSequence}/transactions/${winTxPushKey}`] = {
                        title: "BINGO SCRATCH CARD WINNINGS",
                        amount: currentRoundWinValue,
                        type: "income",
                        timestamp: timestampStr
                    };
                }

                if (adminNodeKey) {
                    const currentAdminBal = parseFloat(allUsers[adminNodeKey].walletBalance) || 0;
                    updates[`users/${adminNodeKey}/walletBalance`] = parseFloat((currentAdminBal + ticketCost).toFixed(2));
                    
                    const adminTxKey = push(ref(db, `users/${adminNodeKey}/transactions`)).key;
                    updates[`users/${adminNodeKey}/transactions/${adminTxKey}`] = {
                        title: `BINGO ENTRY POOL RECEIVED (+251${completeRawCardSequence})`,
                        amount: ticketCost,
                        type: "income",
                        timestamp: timestampStr
                    };
                }

                await update(ref(db), updates);
                buildGameBoardLayout();

            } catch (err) {
                console.error(err);
                showToast("Transaction execution error.", "error");
            } finally {
                resetModalBtn();
            }
        }

        function resetModalBtn() {
            const actionBtn = document.getElementById('modalActionBtn');
            actionBtn.disabled = false;
            actionBtn.innerText = "Pay 20 Birr & Play";
        }

        function buildGameBoardLayout() {
            logosFound = 0;
            revealedItems = 0;
            activeGameState = true;

            document.getElementById('gameModal').classList.remove('active');
            document.getElementById('initPlaySection').style.display = 'none';
            
            const grid = document.getElementById('gridContainer');
            grid.innerHTML = '';
            grid.style.display = 'grid';
            
            document.getElementById('gameInstruction').innerText = 'Scratch to find the money logos!';

            let contentsArray = [];
            for (let i = 0; i < totalItems; i++) {
                contentsArray.push(i < targetLogosCount);
            }
            contentsArray.sort(() => Math.random() - 0.5);

            for (let i = 0; i < totalItems; i++) {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'grid-item';
                itemDiv.onclick = () => scratchBox(itemDiv, contentsArray[i]);

                const imgEl = document.createElement('img');
                imgEl.className = 'progressive-blur-img';

                if (contentsArray[i]) {
                    imgEl.src = winImage;
                    imgEl.alt = 'Winning Logo';
                } else {
                    const randomLoseImg = loseImages[Math.floor(Math.random() * loseImages.length)];
                    imgEl.src = randomLoseImg;
                    imgEl.alt = 'Try Again';
                }
                
                setupProgressiveBlur(imgEl);

                itemDiv.appendChild(imgEl);
                const foilDiv = document.createElement('div');
                foilDiv.className = 'scratch-foil';
                itemDiv.appendChild(foilDiv);
                grid.appendChild(itemDiv);
            }
        }

        function scratchBox(itemElement, isLogo) {
            if (!activeGameState || itemElement.classList.contains('revealed')) return;

            itemElement.classList.add('revealed');
            revealedItems++;

            if (isLogo) logosFound++;

            if (revealedItems < totalItems) {
                document.getElementById('gameInstruction').innerText = `Scratched ${revealedItems} / ${totalItems}`;
            } else {
                setTimeout(showRewardPopup, 400);
            }
        }

        function showRewardPopup() {
            activeGameState = false;
            document.getElementById('gameInstruction').innerText = 'Round Complete!';
            
            const title = document.getElementById('modalTitle');
            const logosText = document.getElementById('modalLogos');
            const prizeBox = document.getElementById('modalPrizeBox');
            const prizeText = document.getElementById('modalPrize');
            const actionBtn = document.getElementById('modalActionBtn');

            document.getElementById('userPinInput').style.display = "none";
            prizeBox.style.display = "block";
            
            logosText.innerText = `You uncovered ${logosFound} money logo${logosFound !== 1 ? 's' : ''}.`;
            prizeText.innerText = `${currentRoundWinValue} Birr`;

            if (currentRoundWinValue > 0) {
                title.innerText = "Congratulations!";
                title.className = "modal-title win";
                actionBtn.innerText = "Play Again";
                actionBtn.className = "btn";
                showToast(`Credited ${currentRoundWinValue} Birr to your wallet balance!`, "success");
            } else {
                title.innerText = "Game Over!";
                title.className = "modal-title lose";
                actionBtn.innerText = "Try Again";
                actionBtn.className = "btn btn-dark";
            }

            document.getElementById('gameModal').classList.add('active');
        }
    </script>
</body>
</html>
